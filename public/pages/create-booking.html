<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Booking</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="container py-4">
      <h1 class="h4">Create Booking</h1>
      <div id="requestSummary" class="mb-3"></div>

      <form id="createBookingForm">
        <div class="mb-2">
          <label class="form-label">Event Date</label>
          <input id="eventDate" name="eventDate" type="date" class="form-control" required />
        </div>
        <div class="mb-2">
          <label class="form-label">Event Location</label>
          <input id="eventLocation" name="eventLocation" type="text" class="form-control" required />
        </div>
        <div class="mb-2">
          <label class="form-label">Total Amount</label>
          <input id="totalAmount" name="totalAmount" type="number" step="0.01" class="form-control" required />
        </div>
        <div class="mb-2">
          <label class="form-label">Special Requests (optional)</label>
          <textarea id="specialRequests" name="specialRequests" class="form-control" rows="3"></textarea>
        </div>

        <div class="d-flex gap-2">
          <button id="btnCreateBooking" type="submit" class="btn btn-primary">Create Booking</button>
          <a id="btnCancel" class="btn btn-secondary" href="requests.html">Cancel</a>
        </div>
      </form>

      <div id="confirmation" class="mt-3 d-none">
        <h2 class="h5">Booking created</h2>
        <p id="confirmationText"></p>
        <button id="btnRecordPayment" class="btn btn-success">Record Payment (Offline)</button>
        <a id="btnGoBookings" class="btn btn-link" href="bookings.html">View Bookings</a>
      </div>
    </div>

    <script type="module">
      import { initCreateBookingPage } from '../js/pages/create-booking.js';
      initCreateBookingPage();
    </script>
  </body>
</html>
