<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Booking - Book Me Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>
    <div id="toastHost" class="position-fixed top-0 end-0 p-3"></div>

    <nav class="navbar navbar-dark navbar-glass sticky-top bme-navbar">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navCreateBookingContent"
          aria-controls="navCreateBookingContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div id="navCreateBookingContent" class="collapse navbar-collapse">
          <div class="ms-auto d-flex gap-2 align-items-center justify-content-end flex-wrap">
            <a class="btn btn-soft" href="services.html">Browse</a>

            <button
              id="themeToggleBtn"
              class="btn btn-soft btn-sm bme-theme-toggle"
              type="button"
              aria-label="Toggle dark/light theme"
              title="Toggle theme"
            >
              <span data-icon="sun">☀️</span>
              <span data-icon="moon">🌙</span>
            </button>

            <button class="btn btn-soft" id="btnLogout" type="button">Logout</button>
          </div>
        </div>
      </div>
    </nav>

<section class="section">
      <div class="container">
        <div class="row g-4 align-items-start">
          <div class="col-12 col-lg-4">
            <div class="card card-glass p-4 fade-slide">
              <div class="badge badge-glow mb-3" id="roleBadge">Create booking</div>
              <h2 class="h5 fw-bold mb-1" id="meName">—</h2>
              <div class="text-muted-soft" id="meEmail">—</div>
              <hr />

              <div class="d-flex gap-3 align-items-center">
                <div id="avatar" class="rounded-circle border bme-avatar">
                  BME
                </div>
                <div>
                  <div class="small text-muted-soft">Role</div>
                  <div class="fw-bold" id="meRole">—</div>
                </div>
              </div>
            </div>

            <div class="mt-4 card card-glass p-4 fade-slide">
              <div class="fw-bold mb-2">Workflow</div>
              <div class="small text-muted-soft" id="workflowHint">Create the booking and record payment.</div>
              <div class="mt-3 d-grid gap-2">
                <a class="btn btn-soft" href="requests.html">Requests</a>
                <a class="btn btn-soft" href="bookings.html">Bookings</a>
              </div>
            </div>
          </div>

          <div class="col-12 col-lg-8">
            <div class="card card-glass p-4 fade-slide bme-chat-panel">
              <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
                <div>
                  <div class="badge badge-glow text-white mb-2">Create Booking</div>
                  <h3 class="h5 fw-bold mb-0">Finalize booking details</h3>
                </div>
              </div>

              <div id="contentArea">
                <div id="authzError" class="alert alert-danger d-none" role="alert"></div>

                <div class="card card-glass p-3">
                  <div id="requestSummary" class="mb-3 small text-muted-soft"></div>

                  <form id="createBookingForm">
                    <div class="row g-3">
                      <div class="col-12 col-md-6">
                        <label class="form-label small">Event Date</label>
                        <input id="eventDate" name="eventDate" type="date" class="form-control form-control-sm" required />
                      </div>
                      <div class="col-12 col-md-6">
                        <label class="form-label small">Event Location</label>
                        <input id="eventLocation" name="eventLocation" type="text" class="form-control form-control-sm" required />
                      </div>

                      <div class="col-12 col-md-6">
                        <label class="form-label small">Total Amount</label>
                        <div class="input-group input-group-sm">
                          <span class="input-group-text">₦</span>
                          <input id="totalAmount" name="totalAmount" type="number" step="0.01" class="form-control form-control-sm" required />
                        </div>
                      </div>

                      <div class="col-12">
                        <label class="form-label small">Special Requests (optional)</label>
                        <textarea id="specialRequests" name="specialRequests" class="form-control form-control-sm" rows="3"></textarea>
                      </div>

                      <div class="col-12 d-flex gap-2">
                        <button id="btnCreateBooking" type="submit" class="btn btn-brand btn-sm">Create Booking</button>
                        <a id="btnCancel" class="btn btn-soft btn-sm" href="requests.html">Back to requests</a>
                      </div>
                    </div>
                  </form>

                  <div id="confirmation" class="mt-3 d-none">
                    <h2 class="h6">Booking created</h2>
                    <p id="confirmationText" class="small text-muted-soft"></p>
                    <div class="d-flex gap-2">
                      <a id="btnGoBookings" class="btn btn-link btn-sm" href="bookings.html">View Bookings</a>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
          <div>© <span id="year"></span> Book Me Events</div>
          <div class="text-muted-soft small">Create Booking</div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { fetchMe, logoutUser, clearToken } from '../js/api.js';
      import { toast, setYear } from '../js/ui.js';
      import { initCreateBookingPage } from '../js/pages/create-booking.js';
      import { initNavbarBrandRoleRedirect } from '../js/role-redirect.js';
      import { initThemeToggle } from '../js/theme-toggle.js';

      setYear('year');
      initThemeToggle();
      initNavbarBrandRoleRedirect();

      const avatarEl = document.getElementById('avatar');

      function setAvatarUrl(url) {
        if (!avatarEl) return;
        if (url) {
          avatarEl.style.backgroundImage = `url(${url})`;
          avatarEl.style.backgroundSize = 'cover';
          avatarEl.style.backgroundPosition = 'center';
          avatarEl.textContent = '';
          avatarEl.style.fontWeight = 'normal';
          return;
        }
        avatarEl.style.backgroundImage = '';
        avatarEl.textContent = 'BME';
        avatarEl.style.fontWeight = '900';
      }

      function getAvatarInitials(name) {
        return (name || 'BME')
          .split(' ')
          .filter(Boolean)
          .slice(0, 2)
          .map((x) => x[0].toUpperCase())
          .join('');
      }

      async function loadMe() {
        try {
          const res = await fetchMe();
          const me = res?.data || res;
          document.getElementById('meName').textContent = me?.firstName
            ? `${me.firstName} ${me.lastName || ''}`.trim()
            : '—';
          document.getElementById('meEmail').textContent = me?.email || '—';

          if (me?.profilePicture) {
            setAvatarUrl(me.profilePicture);
          } else {
            avatarEl.textContent = getAvatarInitials(me?.firstName || 'BME');
            avatarEl.style.backgroundImage = '';
            avatarEl.style.background = 'rgba(124,92,255,0.12)';
          }

          const role = (me?.role || me?.user?.role || 'USER').toString().toUpperCase();

          document.getElementById('meRole').textContent = role;
          return { me, role };
        } catch {
          clearToken();
          toast({ title: 'Session expired', message: 'Please log in again.', variant: 'danger' });
          window.location.href = 'auth-login.html';
          return null;
        }
      }

      document.getElementById('btnLogout').addEventListener('click', async () => {
        try {
          await logoutUser();
        } finally {
          clearToken();
        }
        toast({ title: 'Logged out', message: 'See you again.', variant: 'success' });
        window.location.href = 'auth-login.html';
      });

      const meRes = await loadMe();
      await initCreateBookingPage();
    </script>
  </body>
</html>
