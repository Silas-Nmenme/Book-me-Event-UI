<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Announcements - Book Me Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>
    <div id="toastHost" class="position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>

    <nav class="navbar navbar-dark navbar-glass sticky-top bme-navbar">
      <div class="container">
        <a class="navbar-brand" href="index.html" id="brandRoleRedirect">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>
        <div class="ms-auto d-flex gap-2 align-items-center">
          <a class="btn btn-soft" href="user-dashboard.html" id="btnBackToDashboard">Back</a>
          <button class="btn btn-soft" id="btnLogout" type="button">Logout</button>
        </div>
      </div>
    </nav>

    <section class="section" style="padding-top:72px; padding-bottom:64px;">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-10 col-lg-8">
            <div class="card card-glass p-4 p-md-5 fade-slide">
              <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
                <div>
                  <span class="badge badge-glow text-white">Announcements</span>
                  <h1 class="h4 fw-bold mt-2 mb-0">Latest updates</h1>
                  <div class="small text-muted-soft mt-1">Full announcement list for your role.</div>
                </div>
              </div>

              <div class="d-flex align-items-center justify-content-between gap-2 mb-3">
                <div class="small text-muted-soft" id="announcementsMeta">—</div>
                <button id="btnMarkAllRead" class="btn btn-brand btn-sm" type="button">Mark as read</button>
              </div>

              <div id="announcementsList" class="row g-3" style="min-height:120px;"></div>

              <div id="announcementsEmpty" class="text-muted-soft small d-none" style="margin-top:10px;">
                No announcements at the moment.
              </div>

              <div id="announcementsLoading" class="text-muted-soft small d-none" style="margin-top:12px;">
                Loading…
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
          <div>© <span id="year"></span> Book Me Events</div>
          <div class="text-muted-soft small">Announcements</div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
      import { fetchMe, logoutUser, clearToken, apiFetch } from '../js/api.js';
      import { toast, setYear } from '../js/ui.js';
      import { initThemeToggle } from '../js/theme-toggle.js';
      import { initNavbarBrandRoleRedirect } from '../js/role-redirect.js';

      setYear('year');
      initThemeToggle();
      initNavbarBrandRoleRedirect({
        selector: '#brandRoleRedirect',
        onAuthRequired: () => {
          // role-redirect handles redirect to login
        },
      });

      const btnLogout = document.getElementById('btnLogout');
      btnLogout?.addEventListener('click', async () => {
        try { await logoutUser(); } finally { clearToken(); }
        toast({ title: 'Logged out', message: 'See you again.', variant: 'success' });
        window.location.href = 'auth-login.html';
      });

      function setBackLink(role) {
        const back = document.getElementById('btnBackToDashboard');
        if (!back) return;
        if (role === 'VENDOR') back.href = 'vendor-dashboard.html';
        else if (role === 'USER') back.href = 'user-dashboard.html';
        else back.href = 'index.html';
      }

      function escapeHtml(s) {
        return (s ?? '')
          .toString()
          .replace(/[&<>\"']/g, (c) => {
            const m = {
              '&': '&amp;',
              '<': '<',
              '>': '>',
              '\"': '\"',
              "'": '&#039;',
            };
            return m[c] || c;
          });
      }

      function renderAnnouncement(a) {
        const title = escapeHtml(a?.title || 'Announcement');
        const message = escapeHtml(a?.message || '');
        const date = a?.createdAt ? new Date(a.createdAt).toLocaleString() : '—';
        return `
          <div class="col-12">
            <div class="card card-glass p-3">
              <div class="d-flex align-items-start justify-content-between gap-2">
                <div>
                  <div class="fw-bold">${title}</div>
                  <div class="small text-muted-soft mt-1">${escapeHtml(date)}</div>
                </div>
              </div>
              <div class="text-muted-soft mt-2" style="white-space: pre-wrap;">${message}</div>
            </div>
          </div>
        `;
      }

      async function loadAnnouncements({ role }) {
        const listEl = document.getElementById('announcementsList');
        const emptyEl = document.getElementById('announcementsEmpty');
        const metaEl = document.getElementById('announcementsMeta');
        const loadingEl = document.getElementById('announcementsLoading');

        listEl.innerHTML = '';
        emptyEl.classList.add('d-none');

        loadingEl.classList.remove('d-none');
        try {
          // Load many to effectively show "full list". Backend already supports pagination.
          const page = 1;
          const limit = 200;
          const res = await apiFetch(`/api/v1/announcements?page=${page}&limit=${limit}`, { method: 'GET' });
          const data = res?.data || res;
          const items = Array.isArray(data) ? data : data?.data || data?.items || [];

          if (!items.length) {
            emptyEl.classList.remove('d-none');
            metaEl.textContent = '—';
            return;
          }

          metaEl.textContent = `${items.length} announcement(s)`;
          listEl.innerHTML = items.map(renderAnnouncement).join('');
        } catch (e) {
          toast({ title: 'Failed', message: e?.message || 'Could not load announcements.', variant: 'danger' });
          emptyEl.classList.remove('d-none');
        } finally {
          loadingEl.classList.add('d-none');
        }
      }

      // "Mark as read" is role-based; backend currently doesn’t track per-user read status.
      // So this is best-effort no-op for now. If backend support is later added, we will hook it here.
      async function markAsRead() {
        toast({ title: 'Marked', message: 'Announcements marked as read (best-effort).', variant: 'success' });
      }

      const me = await (async () => {
        try {
          const res = await fetchMe();
          const meObj = res?.data || res;
          const role = meObj?.role || meObj?.user?.role;
          setBackLink(role);
          await loadAnnouncements({ role });
          document.getElementById('btnMarkAllRead')?.addEventListener('click', markAsRead);
        } catch {
          clearToken();
          toast({ title: 'Session expired', message: 'Please log in again.', variant: 'danger' });
          window.location.href = 'auth-login.html';
        }
      })();
    </script>
  </body>
</html>
