<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vendor registration - Page 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>
    <div id="toastHost" class="position-fixed top-0 end-0 p-3"></div>

    <nav class="navbar navbar-dark navbar-glass sticky-top bme-navbar">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navVendorRegister1Content"
          aria-controls="navVendorRegister1Content"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div id="navVendorRegister1Content" class="collapse navbar-collapse">
          <div class="ms-auto d-flex gap-2 align-items-center justify-content-end flex-wrap">
            <a class="btn btn-soft" href="auth-login.html">Login</a>

            <button
              id="themeToggleBtn"
              class="btn btn-soft btn-sm bme-theme-toggle"
              type="button"
              aria-label="Toggle dark/light theme"
              title="Toggle theme"
            >
              <span data-icon="sun">☀️</span>
              <span data-icon="moon">🌙</span>
            </button>
          </div>
        </div>
      </div>
    </nav>

<section class="section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-6">
            <div class="card card-glass p-4 p-md-5 fade-slide">
              <div class="d-flex align-items-center justify-content-between mb-3">
                <span class="brand-pill">
                  <span class="brand-dot"></span>
                  <span class="fw-bold">Vendor signup</span>
                </span>
                <span class="badge text-bg-dark border badge-outline-brand">Step 1</span>
              </div>

              <h1 class="h4 fw-bold mb-1">Create your vendor account</h1>
              <div class="text-muted-soft small mb-4">We will send a 6-digit OTP to your email.</div>

              <form id="vendorRegisterForm" class="row g-3" autocomplete="on">
                <div class="col-12 col-md-6">
                  <label class="form-label" for="firstName">First name</label>
                  <input class="form-control" id="firstName" name="firstName" type="text" placeholder="John" required />
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label" for="lastName">Last name</label>
                  <input class="form-control" id="lastName" name="lastName" type="text" placeholder="Doe" required />
                </div>

                <div class="col-12">
                  <label class="form-label" for="email">Email</label>
                  <input class="form-control" id="email" name="email" type="email" placeholder="name@example.com" required />
                </div>

                <div class="col-12">
                  <label class="form-label" for="phone">Phone</label>
                  <input class="form-control" id="phone" name="phone" type="tel" placeholder="080XXXXXXXX" required />
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label" for="password">Password</label>
                  <input class="form-control" id="password" name="password" type="password" placeholder="Create a password" required />
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label" for="passwordConfirm">Confirm password</label>
                  <input class="form-control" id="passwordConfirm" name="passwordConfirm" type="password" placeholder="Confirm password" required />
                </div>

                <div class="col-12">
                  <button type="submit" class="btn btn-brand w-100" id="btnVendorNext">Next</button>
                </div>

                <div class="col-12 small text-muted-soft" id="vendorHint"></div>

                <div class="col-12 d-flex flex-wrap gap-2 align-items-center justify-content-between">
                  <a class="text-muted-soft small" href="auth-register.html">Register as user</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
          <div>© <span id="year"></span> Book Me Events</div>
          <div class="text-muted-soft small">Vendor signup</div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
      import { apiFetch } from '../js/api.js';
      import { toast, setYear } from '../js/ui.js';
      import { initThemeToggle } from '../js/theme-toggle.js';

      setYear('year');
      initThemeToggle();

      document.getElementById('vendorRegisterForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('passwordConfirm').value;

        const btn = document.getElementById('btnVendorNext');
        btn.disabled = true;

        const hint = document.getElementById('vendorHint');
        hint.textContent = '';

        try {
          await apiFetch('/api/v1/vendors/register/page1', {
            method: 'POST',
            body: JSON.stringify({ firstName, lastName, email, phone, password, passwordConfirm }),
          });

          toast({ title: 'OTP sent', message: 'Continue to fill your vendor profile.', variant: 'success' });
          window.location.href = 'vendor-register-page2.html';
        } catch (err) {
          hint.textContent = err?.message || 'Vendor signup failed';
          toast({ title: 'Failed', message: err?.message || 'Try again.', variant: 'danger' });
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
