<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin 2FA Setup - Book Me Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/landing-professional.css" />
  </head>

  <body>
    <div id="toastHost" class="position-fixed top-0 end-0 p-3"></div>

    <nav class="navbar navbar-dark navbar-glass sticky-top bme-navbar">
      <div class="container">
        <a class="navbar-brand" href="admin-dashboard.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>

        <div id="navAdminOtpContent" class="collapse navbar-collapse show">
          <div class="ms-auto d-flex gap-2 align-items-center justify-content-end flex-wrap">
            <a class="btn btn-soft" href="admin-dashboard.html">Back</a>

            <button
              id="themeToggleBtn"
              class="btn btn-soft btn-sm bme-theme-toggle"
              type="button"
              aria-label="Toggle dark/light theme"
              title="Toggle theme"
            >
              <span data-icon="sun">☀️</span>
              <span data-icon="moon">🌙</span>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-9 col-lg-7">
            <div class="card card-glass p-4 p-md-5 fade-slide">
              <div class="d-flex align-items-center justify-content-between mb-3">
                <span class="brand-pill">
                  <span class="brand-dot"></span>
                  <span class="fw-bold">Admin 2FA Setup</span>
                </span>
                <span class="badge text-bg-dark border badge-outline-brand">TOTP</span>
              </div>

              <h1 class="h4 fw-bold mb-1">Scan QR code</h1>
              <div class="text-muted-soft small mb-4">
                Use an authenticator app (Google Authenticator, Authy, Microsoft Authenticator).
                No email is sent for this step.
              </div>

              <div class="row g-3">
                <div class="col-12 col-md-6">
                  <div class="p-3" style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:16px;">
                    <div class="small text-muted-soft mb-2">Authenticator QR</div>
                    <div id="qrWrap" class="d-flex justify-content-center">
                      <div class="text-muted-soft">Loading QR…</div>
                    </div>

                    <div id="qrError" class="text-danger small mt-2"></div>

                    <details class="mt-3">
                      <summary class="small text-muted-soft">Show setup key</summary>
                      <div class="small" style="word-break:break-all;" id="otpauthBox"></div>
                    </details>
                  </div>
                </div>

                <div class="col-12 col-md-6">
                  <div class="p-3" style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:16px;">
                    <div class="small text-muted-soft mb-2">Verify first code</div>
                    <form id="verifyForm" class="row g-3" autocomplete="on">
                      <div class="col-12">
                        <label class="form-label" for="totpCode">6-digit TOTP code</label>
                        <input
                          class="form-control"
                          id="totpCode"
                          name="totpCode"
                          type="text"
                          inputmode="numeric"
                          maxlength="6"
                          placeholder="123456"
                          required
                        />
                      </div>
                      <div class="col-12">
                        <button type="submit" id="btnVerify" class="btn btn-brand w-100">Enable 2FA</button>
                      </div>
                      <div class="col-12 small text-muted-soft" id="verifyHint"></div>
                    </form>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

    <script type="module">
      import { apiFetch } from '../js/api.js';
      import { toast } from '../js/ui.js';
      import { initThemeToggle } from '../js/theme-toggle.js';

      initThemeToggle();


      const qrWrap = document.getElementById('qrWrap');
      const qrError = document.getElementById('qrError');
      const otpauthBox = document.getElementById('otpauthBox');

      async function loadQr() {
        qrError.textContent = '';
        qrWrap.innerHTML = '<div class="text-muted-soft">Loading QR…</div>';

        try {
          const res = await apiFetch('/api/v1/admin/2fa/setup', { method: 'GET' });
          const otpauthUrl = res?.data?.otpauth_url;

          if (!otpauthUrl) {
            throw new Error('Missing otpauth_url in response');
          }

          otpauthBox.textContent = otpauthUrl;

          // Render QR
          // NOTE: qrcode.toCanvas(...) expects a <canvas> element. Passing a <div>
          // triggers errors like: "o.getContext is not a function".
          const canvas = document.createElement('canvas');
          canvas.width = 220;
          canvas.height = 220;

          qrWrap.innerHTML = '';
          qrWrap.appendChild(canvas);

          // Prefer explicit hex-ish values from theme tokens when possible.
          const root = document.documentElement;
          const themeText = getComputedStyle(root).getPropertyValue('--text').trim();

          // If themeText isn't usable as a color, fall back to a dark default.
          const darkColor = themeText && themeText !== 'transparent' ? themeText : '#0b0f1c';

          await window.QRCode.toCanvas(canvas, otpauthUrl, {
            margin: 1,
            errorCorrectionLevel: 'M',
            width: 220,
            color: {
              dark: darkColor,
              light: '#ffffff',
            },
          });

          if (!canvas || !(qrWrap.contains(canvas) && canvas.getContext && canvas.toDataURL)) {
            qrWrap.textContent = 'Unable to render QR in this browser.';
          }
        } catch (err) {
          const msg = err?.message || 'Failed to load QR';
          qrError.textContent = msg;
          qrWrap.textContent = '';
          toast({ title: '2FA setup failed', message: msg, variant: 'danger' });
        }
      }

      document.getElementById('verifyForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const btn = document.getElementById('btnVerify');
        const hint = document.getElementById('verifyHint');
        const totpCode = document.getElementById('totpCode').value.trim();
        btn.disabled = true;
        hint.textContent = '';

        try {
          const res = await apiFetch('/api/v1/admin/2fa/verify', {
            method: 'POST',
            body: JSON.stringify({ totpCode }),
          });

          toast({ title: '2FA enabled', message: 'Redirecting…', variant: 'success' });
          window.location.href = 'admin-dashboard.html';
        } catch (err) {
          const msg = err?.data?.message || err?.message || 'Failed to verify code';
          const status = err?.status;
          hint.textContent = status ? `(${status}) ${msg}` : msg;
          toast({ title: 'Verification failed', message: msg, variant: 'danger' });
          // Useful when debugging auth vs invalid TOTP
          console.error('2FA verify error:', err);
        } finally {
          btn.disabled = false;
        }
      });

      await loadQr();
    </script>
  </body>
</html>
