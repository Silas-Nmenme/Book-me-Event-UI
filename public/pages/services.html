<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Services - Book Me Events</title>
    <meta name="API_BASE" content="https://book-me-events.vercel.app" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>
    <div id="toastHost"></div>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-glass sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navContent"
          aria-controls="navContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div id="navContent" class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto gap-2">
            <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
            <li class="nav-item"><a class="nav-link" href="requests.html">Requests</a></li>
            <li class="nav-item"><a class="nav-link" href="bookings.html">Bookings</a></li>
            <li class="nav-item"><a class="nav-link" href="messages.html">Messages</a></li>
            <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
            <li class="nav-item"><a class="nav-link" href="auth-login.html" id="navAuthLink">Login</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3 mb-4">
          <div>
            <h2 class="mb-1 fw-bold fade-slide">Explore services</h2>
            <div class="text-muted-soft">Filter by category, location and price. Then request instantly.</div>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-soft" id="btnClearFilters" type="button">Clear filters</button>
            <a class="btn btn-brand" href="auth-register.html">Request as Organizer</a>
          </div>
        </div>

        <div class="card card-glass p-4 mb-4 card-hover">
          <div class="row g-3">
            <div class="col-12 col-md-4">
              <label class="form-label" for="filterCategory">Category</label>
              <select class="form-select" id="filterCategory" aria-label="Category">
                <option value="">All categories</option>
              </select>
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label" for="filterLocation">Location</label>
              <input class="form-control" id="filterLocation" placeholder="e.g. Lagos" aria-label="Location" />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Max price (₦)</label>
              <input class="form-control" id="filterMaxPrice" type="number" min="0" placeholder="e.g. 500000" />
            </div>
          </div>
        </div>

        <div id="servicesSkeleton" class="mb-3"></div>
        <div class="row g-3" id="servicesGrid"></div>

        <div class="text-center text-muted-soft mt-4" id="emptyState" style="display:none;">
          <div class="display-6 mb-2">🪄</div>
          <div>No services matched your filters.</div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
          <div>© <span id="year"></span> Book Me Events</div>
          <div class="text-muted-soft small">Marketplace UI</div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/pages/services.js"></script>
  </body>
</html>
