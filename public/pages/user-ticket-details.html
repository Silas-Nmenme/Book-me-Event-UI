<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ticket Details - Book Me Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/landing-professional.css" />
  </head>

  <body>
    <div id="toastHost" class="position-fixed top-0 end-0 p-3"></div>

    <nav class="navbar navbar-dark navbar-glass sticky-top bme-navbar">
      <div class="container">
        <a class="navbar-brand" href="user-tickets.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>
        <button class="btn btn-soft ms-auto" id="btnLogout" type="button">Logout</button>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-10 col-lg-8">

            <div class="card card-glass p-4 p-md-5 fade-slide">
              <div class="d-flex flex-wrap align-items-start justify-content-between gap-3 mb-3">
                <div>
                  <div class="badge badge-glow text-white">Ticket</div>
                  <h1 class="h4 fw-bold mt-2 mb-1" id="ticketSubject">—</h1>
                  <div class="small text-muted-soft" id="ticketMeta">—</div>
                </div>
                <div class="text-end">
                  <div class="badge bg-secondary" id="ticketStatus">OPEN</div>
                  <div class="badge bg-light text-dark mt-2" id="ticketPriority">MEDIUM</div>
                </div>
              </div>

              <div class="alert alert-danger d-none" id="ticketError" role="alert"></div>
              <div class="text-muted-soft small d-none" id="ticketLoading">Loading…</div>

              <div class="mt-3">
                <h2 class="h6 fw-bold">Description</h2>
                <p class="text-muted-soft" style="white-space: pre-wrap;" id="ticketDescription">—</p>
              </div>

              <div class="mt-4">
                <h2 class="h6 fw-bold">Linked entities</h2>
                <div class="small text-muted-soft" id="ticketLinks">—</div>
              </div>

              <div class="mt-4">
                <a class="btn btn-soft" href="user-tickets.html">Back to tickets</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { fetchMe, logoutUser, clearToken, apiFetch } from '../js/api.js';
      import { toast, setYear } from '../js/ui.js';
      import { initThemeToggle } from '../js/theme-toggle.js';

      setYear('year');
      initThemeToggle();

      document.getElementById('btnLogout')?.addEventListener('click', async () => {
        try { await logoutUser(); } finally { clearToken(); }
        toast({ title: 'Logged out', message: 'See you again.', variant: 'success' });
        window.location.href = 'auth-login.html';
      });

      function qs(name) {
        return new URLSearchParams(window.location.search).get(name);
      }

      function escapeHtml(s) {
        return (s ?? '')
          .toString()
          .replace(/[&<>\"']/g, (c) => {
            const m = { '&': '&amp;', '<': '<', '>': '>', '\"': '"', "'": '&#039;' };
            return m[c] || c;
          });
      }

      const ticketId = qs('ticketId');

      async function loadTicket() {
        const subjectEl = document.getElementById('ticketSubject');
        const descEl = document.getElementById('ticketDescription');
        const metaEl = document.getElementById('ticketMeta');
        const statusEl = document.getElementById('ticketStatus');
        const prioEl = document.getElementById('ticketPriority');
        const linksEl = document.getElementById('ticketLinks');

        const errorEl = document.getElementById('ticketError');
        const loadingEl = document.getElementById('ticketLoading');

        if (!ticketId) {
          errorEl?.classList.remove('d-none');
          errorEl.textContent = 'Missing ticketId.';
          return;
        }

        loadingEl?.classList.remove('d-none');
        errorEl?.classList.add('d-none');

        try {
          const res = await apiFetch(`/api/v1/tickets/${encodeURIComponent(ticketId)}`, { method: 'GET' });
          const data = res?.data || res;

          subjectEl.textContent = data?.subject || 'Ticket';
          descEl.textContent = data?.description || '';

          const createdAt = data?.createdAt ? new Date(data.createdAt).toLocaleString() : '—';
          metaEl.textContent = `Created: ${createdAt}`;

          statusEl.textContent = data?.status || 'OPEN';
          prioEl.textContent = data?.priority || 'MEDIUM';

          const reqId = data?.request?._id || data?.request;
          const bookingId = data?.booking?._id || data?.booking;
          linksEl.textContent = `Request: ${reqId || '—'} • Booking: ${bookingId || '—'}`;
        } catch (e) {
          errorEl?.classList.remove('d-none');
          errorEl.textContent = e?.message || 'Failed to load ticket.';
        } finally {
          loadingEl?.classList.add('d-none');
        }
      }

      await fetchMe().catch(() => {
        clearToken();
        window.location.href = 'auth-login.html';
      });

      await loadTicket();
    </script>
  </body>
</html>
