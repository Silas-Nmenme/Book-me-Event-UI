<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin registration - OTP verify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>
    <div id="toastHost" class="position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-glass sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>
        <div class="ms-auto d-flex gap-2">
          <a class="btn btn-soft" href="admin-register-page1.html">Back</a>
          <a class="btn btn-soft" href="auth-login.html">Login</a>
        </div>
      </div>
    </nav>

    <section class="section" style="padding-top:72px; padding-bottom:64px;">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-6">
            <div class="card card-glass p-4 p-md-5 fade-slide">
              <div class="d-flex align-items-center justify-content-between mb-3">
                <span class="brand-pill">
                  <span class="brand-dot"></span>
                  <span class="fw-bold">Admin signup</span>
                </span>
                <span class="badge text-bg-dark border" style="border-color: rgba(124,92,255,0.45) !important;">Step 2</span>
              </div>

              <h1 class="h4 fw-bold mb-1">Verify OTP</h1>
              <div class="text-muted-soft small mb-4">Enter the 6-digit code sent to your email.</div>

              <form id="adminOtpForm" class="row g-3" autocomplete="on">
                <div class="col-12">
                  <label class="form-label" for="email">Email</label>
                  <input class="form-control" id="email" name="email" type="email" required />
                </div>

                <div class="col-12">
                  <label class="form-label" for="otp">6-digit OTP</label>
                  <input class="form-control" id="otp" name="otp" type="text" inputmode="numeric" maxlength="6" placeholder="123456" required />
                  <div class="form-text text-muted-soft">OTP is valid for a limited time.</div>
                </div>

                <div class="col-12">
                  <button type="submit" class="btn btn-brand w-100" id="btnVerifyAdminOtp">Verify & Finish</button>
                </div>

                <div class="col-12 small text-muted-soft" id="adminOtpHint"></div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
          <div>© <span id="year"></span> Book Me Events</div>
          <div class="text-muted-soft small">Admin OTP verification</div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
      import { apiFetch } from '../js/api.js';
      import { toast, setYear } from '../js/ui.js';
      import { initThemeToggle } from '../js/theme-toggle.js';

      setYear('year');
      initThemeToggle();

      function normalizeOtp(x) {
        return (x || '').toString().trim();
      }

      document.getElementById('adminOtpForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const otp = normalizeOtp(document.getElementById('otp').value);

        const btn = document.getElementById('btnVerifyAdminOtp');
        btn.disabled = true;

        const hint = document.getElementById('adminOtpHint');
        hint.textContent = '';

        try {
          const res = await apiFetch('/api/v1/admin/register/page2/verify-otp', {
            method: 'POST',
            body: JSON.stringify({ email, otp }),
          });

          if (res?.token) localStorage.setItem('bme_token', res.token);

          toast({ title: 'Admin verified', message: 'Redirecting to admin dashboard…', variant: 'success' });
          window.location.href = 'auth-login.html';
        } catch (err) {
          hint.textContent = err?.message || 'OTP verification failed.';
          toast({ title: 'Verify failed', message: err?.message || 'Try again.', variant: 'danger' });
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
