<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bookings - Book Me Events</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>
    <div id="toastHost"></div>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-glass sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>

        <div class="ms-auto d-flex gap-2">
          <a class="btn btn-soft" href="services.html">Browse</a>
          <a class="btn btn-soft" href="requests.html">Requests</a>
          <a class="btn btn-soft" href="messages.html" id="navMessagesBtn">Messages</a>
          <button class="btn btn-soft" id="btnLogout" type="button">Logout</button>
        </div>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
          <div>
            <div class="badge badge-glow">Your bookings</div>
            <h1 class="h4 fw-bold mt-2 mb-0">Bookings</h1>
          </div>

          <div class="d-flex align-items-center gap-2">
<select id="filterStatus" class="form-select form-select-sm" style="width: 180px;" aria-label="Filter booking status">
              <option value="">All statuses</option>
              <option value="PENDING">PENDING</option>
              <option value="COMPLETED">COMPLETED</option>
              <option value="CANCELLED">CANCELLED</option>
            </select>
            <button class="btn btn-brand btn-sm" id="btnRefresh" type="button">Refresh</button>
          </div>
        </div>

        <div id="bookingsSkeleton"></div>
        <div id="emptyState" class="card card-glass p-4" style="display:none;">
          <div class="text-center">
            <div class="display-6 mb-1">No bookings yet</div>
            <div class="text-muted-soft small">Create a request, wait for acceptance, then book.</div>
          </div>
        </div>

        <div class="row g-3" id="bookingsGrid"></div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
          <div>© <span id="year"></span> Book Me Events</div>
          <div class="text-muted-soft small">Bookings</div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script>
      const BookingStatus = {
        PENDING: 'PENDING',
        COMPLETED: 'COMPLETED',
        CANCELLED: 'CANCELLED',
      };

      function escapeHtml(str) {
        return String(str ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '<')
          .replaceAll('>', '>')
          .replaceAll('"', '"')
          .replaceAll("'", '&#039;');
      }

      function statusClass(status) {
        const s = (status || '').toString().toUpperCase();
        if (s === BookingStatus.COMPLETED) return 'border-success';
        if (s === BookingStatus.CANCELLED) return 'border-warning';
        return 'border-info';
      }

      function bookingCard(b, myRole) {
        const id = b?._id || b?.id || '';
        const status = (b?.bookingStatus || '').toString().toUpperCase();
        const serviceName = b?.service?.serviceName || b?.service?.name || b?.service?.title || '';
        const vendorName = b?.vendor?.businessName || b?.vendor?.vendorBusinessName || '';
        const userName = b?.user?.firstName ? `${b.user.firstName} ${b.user.lastName || ''}`.trim() : '';

        const eventDate = b?.eventDate || b?.eventDateTime || '';
        const deadline = b?.responseDeadline || '';

        const canCancel = myRole === 'USER' && status !== BookingStatus.COMPLETED && status !== BookingStatus.CANCELLED;
        const canComplete = myRole === 'VENDOR' && status !== BookingStatus.COMPLETED && status !== BookingStatus.CANCELLED;

        const btnCancel = canCancel
          ? `<button class="btn btn-warning btn-sm" type="button" data-action="cancel" data-id="${escapeHtml(id)}">Cancel</button>`
          : '';
        const btnComplete = canComplete
          ? `<button class="btn btn-success btn-sm" type="button" data-action="complete" data-id="${escapeHtml(id)}">Complete</button>`
          : '';

        return `
          <div class="col-12">
            <div class="card card-glass p-3 h-100 card-hover">
              <div class="d-flex align-items-start justify-content-between gap-3">
                <div>
                  <div class="d-flex flex-wrap align-items-center gap-2">
<span class="badge text-bg-dark border" style="border-color: rgba(124,92,255,0.5) !important;" aria-label="Booking">Booking</span>
                    <span class="badge text-bg-dark border ${escapeHtml(statusClass(status))}" style="border-color: rgba(124,92,255,0.5) !important;">${escapeHtml(status || '—')}</span>
                  </div>

                  <div class="fw-bold mt-2">${escapeHtml(serviceName || 'Service')}</div>
                  <div class="text-muted-soft small">Vendor: ${escapeHtml(vendorName || '—')}</div>
                  ${userName ? `<div class="text-muted-soft small">User: ${escapeHtml(userName)}</div>` : ''}

                  ${eventDate ? `<div class="text-muted-soft small">📅 ${escapeHtml(formatDate(eventDate))}</div>` : ''}

                  ${b?.cancellationReason ? `
                    <div class="text-muted-soft small mt-1">Reason: ${escapeHtml(b.cancellationReason)}</div>
                  ` : ''}
                </div>

                <div class="text-end" style="min-width: 220px;">
                  <div class="d-grid gap-2">
                    ${btnComplete}
                    ${btnCancel}
<a class="btn btn-soft btn-sm" href="service-details.html?id=${encodeURIComponent(b?.service?._id || '')}" aria-label="View service details">Service</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      function renderSkeleton() {
        const host = document.getElementById('bookingsSkeleton');
        if (!host) return;
        host.innerHTML = '';
        for (let i = 0; i < 6; i++) {
          const col = document.createElement('div');
          col.className = 'col-12';
          col.innerHTML = `<div class="card card-glass p-3 skeleton" style="min-height: 140px;"></div>`;
          host.appendChild(col);
        }
      }

      async function fetchMe() {
        return apiFetch('/api/v1/auth/me', { method: 'GET' });
      }

      async function fetchBookings({ status } = {}) {
        const url = status ? `/api/v1/bookings?status=${encodeURIComponent(status)}` : '/api/v1/bookings';
        return apiFetch(url, { method: 'GET' });
      }

      async function actOnBooking({ id, action }) {
        const endpoint = action === 'cancel'
          ? `/api/v1/bookings/${encodeURIComponent(id)}/cancel`
          : `/api/v1/bookings/${encodeURIComponent(id)}/complete`;

        const body = action === 'cancel' ? { cancellationReason: 'Cancelled by user' } : {};
        return apiFetch(endpoint, { method: 'PUT', body });
      }

      async function init() {
        document.getElementById('year').textContent = new Date().getFullYear();

        if (!requireAuth('auth-login.html')) return;

        const btnLogout = document.getElementById('btnLogout');
        if (btnLogout) {
          btnLogout.addEventListener('click', async () => {
            await logoutUser();
            toast({ title: 'Logged out', message: 'See you again.', variant: 'success' });
            window.location.href = 'auth-login.html';
          });
        }

        document.getElementById('btnRefresh')?.addEventListener('click', load);
        document.getElementById('filterStatus')?.addEventListener('change', load);

        document.addEventListener('click', async (e) => {
          const btn = e.target?.closest?.('button[data-action][data-id]');
          if (!btn) return;
          const action = btn.getAttribute('data-action');
          const id = btn.getAttribute('data-id');

          try {
            setLoading(btn, true, 'Working...');
            await actOnBooking({ id, action });
            toast({ title: 'Updated', message: 'Booking updated successfully.', variant: 'success' });
            await load();
          } catch (err) {
            toast({ title: 'Action failed', message: err.message || 'Try again.', variant: 'danger' });
          } finally {
            setLoading(btn, false);
          }
        });

        await load();

        async function load() {
          const grid = document.getElementById('bookingsGrid');
          const empty = document.getElementById('emptyState');
          if (!grid || !empty) return;

          renderSkeleton();
          grid.innerHTML = '';
          empty.style.display = 'none';

          let myRole = '';
          try {
            const me = await fetchMe();
            myRole = me?.role || me?.data?.role || '';
          } catch {
            myRole = '';
          }

          const status = document.getElementById('filterStatus')?.value || '';

          try {
            const res = await fetchBookings({ status });
            const list = res?.data || [];
            document.getElementById('bookingsSkeleton').innerHTML = '';

            if (!list.length) {
              empty.style.display = 'block';
              return;
            }

            for (const b of list) {
              grid.insertAdjacentHTML('beforeend', bookingCard(b, myRole));
            }
          } catch (err) {
            document.getElementById('bookingsSkeleton').innerHTML = '';
            empty.style.display = 'block';
            empty.innerHTML = `
              <div class="text-center">
                <div class="display-6 mb-1">Failed to load bookings</div>
                <div class="text-muted-soft small">${escapeHtml(err.message || 'Try again later')}</div>
              </div>
            `;
          }
        }
      }

      document.addEventListener('DOMContentLoaded', init);
    </script>
  </body>
</html>
