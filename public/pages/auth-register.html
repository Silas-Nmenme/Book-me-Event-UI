<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register - Book Me Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>
    <div id="toastHost"></div>

    <div class="container" style="padding-top: 72px; padding-bottom: 64px;">
      <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-5">
          <div class="card card-glass p-4 p-md-5 fade-slide">
            <div class="d-flex align-items-center justify-content-between mb-3">
              <span class="brand-pill">
                <span class="brand-dot"></span>
                <span class="fw-bold">Book Me Events</span>
              </span>
              <span class="badge badge-glow">New</span>
            </div>

            <h1 class="h4 fw-bold mb-1">Create your account</h1>
            <div class="text-muted-soft small mb-4">Organizer accounts can request services. Vendors can also register and complete KYC.</div>

            <form id="registerForm" class="row g-3" autocomplete="on">
              <div class="col-12">
                <label class="form-label" for="name">Full name</label>
                <input class="form-control" id="name" name="name" placeholder="e.g. Ada Okeke" required />
              </div>

              <div class="col-12">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" name="email" type="email" placeholder="name@example.com" required />
              </div>

              <div class="col-12">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" name="password" type="password" placeholder="Create a password" required minlength="6" />
              </div>

              <div class="col-12">
                <label class="form-label" for="role">Account type</label>
                <select class="form-select" id="role" name="role" aria-label="Account type" required>
                  <option value="USER">Organizer (User)</option>
                  <option value="VENDOR">Vendor</option>
                </select>
              </div>

              <div class="col-12">
                <button type="submit" class="btn btn-brand w-100" id="btnRegister">Create account</button>
              </div>

              <div class="col-12 text-center">
                <a class="text-muted-soft small" href="auth-login.html">Already have an account? Log in</a>
              </div>
            </form>

            <div class="mt-3 small text-muted-soft" id="registerHint"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/pages/auth-register.js"></script>
  </body>
</html>
