<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Messages - Book Me Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/chat.css" />
  </head>

  <body>
    <div id="toastHost" class="position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>

    <nav class="navbar navbar-dark navbar-glass sticky-top bme-navbar">

      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>

        <div class="ms-auto d-flex gap-2">
                  <a class="btn btn-soft" href="services.html">Browse</a>

          <button
            id="themeToggleBtn"
            class="btn btn-soft btn-sm bme-theme-toggle"
            type="button"
            aria-label="Toggle dark/light theme"
            title="Toggle theme"
          >
            <span data-icon="sun" style="display:none;">☀️</span>
            <span data-icon="moon" style="display:inline-flex;">🌙</span>
          </button>

          <button class="btn btn-soft" id="btnLogout" type="button">Logout</button>
        </div>
      </div>
    </nav>

<section class="section" style="padding-top: var(--bme-navbar-height); padding-bottom:64px;">
      <div class="container">
        <div class="row g-4 align-items-start">
          <div class="col-12 col-lg-4">
            <div class="card card-glass p-4 fade-slide">
              <div class="badge badge-glow mb-3" id="roleBadge">Messages</div>
              <h2 class="h5 fw-bold mb-1" id="meName">—</h2>
              <div class="text-muted-soft" id="meEmail">—</div>

              <hr style="border-color: rgba(255,255,255,0.12)" />


              <div class="d-flex gap-3 align-items-center">
                <div
                  id="avatar"
                  class="rounded-circle border"
                  style="width:64px;height:64px;background: rgba(124,92,255,0.12);display:flex;align-items:center;justify-content:center;font-weight:900;"
                >
                  BME
                </div>
                <div>
                  <div class="small text-muted-soft">Role</div>
                  <div class="fw-bold" id="meRole">—</div>
                </div>
              </div>
            </div>

            <div class="mt-4 card card-glass p-4 fade-slide">
              <div class="fw-bold mb-2">Workflow</div>
              <div class="small text-muted-soft" id="workflowHint">—</div>
              <div class="mt-3 d-grid gap-2">
                <a class="btn btn-soft" href="requests.html">Requests</a>
                <a class="btn btn-soft" href="bookings.html">Bookings</a>
              </div>
            </div>
          </div>

          <div class="col-12 col-lg-8">
            <div class="card card-glass p-4 fade-slide" style="min-height: 340px;">
              <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
                <div>
                  <div class="badge badge-glow text-white mb-2">Conversation</div>
                  <h3 class="h5 fw-bold mb-0" id="pageTitle">In-app messages</h3>
                </div>

                <div class="d-flex align-items-center gap-2">
                  <div class="small text-muted-soft" id="unreadCountWrap">Unread: <span id="unreadCount">0</span></div>
                </div>
              </div>

              <div class="row g-3">
                <div class="col-12">
                  <div class="card card-glass p-3">
                    <div id="authzError" class="alert alert-danger d-none" role="alert"></div>
                    <div id="roleNotice" class="alert alert-info d-none" role="alert"></div>

                    <hr />

                    <div class="row g-2 mb-2" id="conversationHeaderRow">
                      <div class="col-12">
                        <div class="small text-muted-soft" id="conversationHeader">Chat</div>
                      </div>
                    </div>

                    <div class="d-flex flex-column" style="max-height: 420px; overflow:auto;" id="messagesList"></div>


                    <div class="mt-3">
                      <label class="form-label fw-bold">Send a message</label>
                      <div class="input-group">
                        <input id="messageText" class="form-control" placeholder="Type your message..." />
                        <button id="btnSendMessage" class="btn btn-brand" type="button">Send</button>
                      </div>
                    </div>

                    <div id="conversationMeta" class="small text-muted-soft mt-3" style="display:none;"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
          <div>© <span id="year"></span> Book Me Events</div>
          <div class="text-muted-soft small">Messages</div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Socket.IO client (CDN) -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <script type="module">
      import { fetchMe, logoutUser, clearToken } from '../js/api.js';
      import { toast, setYear } from '../js/ui.js';
      import { initMessagesPage } from '../js/pages/messages.js';
      import { initNavbarBrandRoleRedirect } from '../js/role-redirect.js';
      import { initThemeToggle } from '../js/theme-toggle.js';

      setYear('year');
      initThemeToggle();
      initNavbarBrandRoleRedirect();



      const avatarEl = document.getElementById('avatar');


      function setAvatarUrl(url) {
        if (!avatarEl) return;
        if (url) {
          avatarEl.style.backgroundImage = `url(${url})`;
          avatarEl.style.backgroundSize = 'cover';
          avatarEl.style.backgroundPosition = 'center';
          avatarEl.textContent = '';
          avatarEl.style.fontWeight = 'normal';
          return;
        }
        avatarEl.style.backgroundImage = '';
        avatarEl.textContent = 'BME';
        avatarEl.style.fontWeight = '900';
      }

      function getAvatarInitials(name) {
        return (name || 'BME')
          .split(' ')
          .filter(Boolean)
          .slice(0, 2)
          .map((x) => x[0].toUpperCase())
          .join('');
      }

      async function loadMe() {

        try {
          const res = await fetchMe();
          const me = res?.data || res;
          // Prefer server-returned display name; fall back to whatever the backend provides.
          const firstName = me?.firstName || me?.user?.firstName;
          const lastName = me?.lastName || me?.user?.lastName;
          document.getElementById('meName').textContent = firstName
            ? `${firstName} ${lastName || ''}`.trim()
            : me?.name || me?.fullName || '—';

          document.getElementById('meEmail').textContent = me?.email || '—';

          if (me?.profilePicture) {
            setAvatarUrl(me.profilePicture);
          } else {
            avatarEl.textContent = getAvatarInitials(me?.firstName || 'BME');
            avatarEl.style.backgroundImage = '';
            avatarEl.style.background = 'rgba(124,92,255,0.12)';
          }

          const role = (me?.role || me?.user?.role || 'USER').toString().toUpperCase();

          document.getElementById('meRole').textContent = role;
          return { me, role };
        } catch {
          clearToken();
          toast({ title: 'Session expired', message: 'Please log in again.', variant: 'danger' });
          window.location.href = 'auth-login.html';
          return null;
        }
      }

      document.getElementById('btnLogout').addEventListener('click', async () => {
        try {
          // logoutUser() already clears the token locally and swallows 401s.
          await logoutUser();
        } catch {
          // ignore any logout errors; we will still clear local session.
        } finally {
          clearToken();
          // In-app session cleanup to ensure all pages require login again.
          sessionStorage.clear();
          localStorage.clear();
        }

        toast({ title: 'Logged out', message: 'See you again.', variant: 'success' });
        window.location.href = 'auth-login.html';
      });

      const meRes = await loadMe();
      await initMessagesPage(meRes);
    </script>
  </body>
</html>
