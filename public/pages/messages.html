<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Messages - Book Me Events</title>
    <meta name="API_BASE" content="https://book-me-events.vercel.app" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>
    <div id="toastHost"></div>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-glass sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navContent"
          aria-controls="navContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div id="navContent" class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto gap-2">
            <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
            <li class="nav-item"><a class="nav-link" href="requests.html">Requests</a></li>
            <li class="nav-item"><a class="nav-link" href="bookings.html">Bookings</a></li>
            <li class="nav-item"><a class="nav-link active" href="messages.html">Messages</a></li>
            <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
            <li class="nav-item"><a class="nav-link" href="auth-login.html" id="navAuthLink">Login</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <div class="d-flex flex-column flex-lg-row gap-3">
          <!-- Conversation list -->
          <div class="col-lg-4" style="min-height: 70vh;">
            <div class="card card-glass p-3 h-100">
              <div class="d-flex align-items-center justify-content-between mb-2">
                <div>
                  <div class="fw-bold">Conversations</div>
                  <div class="text-muted-soft small" id="conversationSubtitle">Your chats</div>
                </div>
                <div class="badge text-bg-dark border" style="border-color: rgba(124,92,255,0.5) !important;" id="unreadBadge">0 unread</div>
              </div>

              <div id="convoSkeleton" class="mb-2"></div>
              <div id="convoList" class="list-group" style="max-height: 62vh; overflow:auto;"></div>

              <div class="text-center text-muted-soft small mt-3" id="convoEmpty" style="display:none;">
                No conversations yet.
              </div>
            </div>
          </div>

          <!-- Chat panel -->
          <div class="col-lg-8">
            <div class="card card-glass p-3 h-100">
              <div class="d-flex align-items-start justify-content-between gap-3 mb-2">
                <div>
                  <div class="fw-bold" id="chatTitle">Select a conversation</div>
                  <div class="text-muted-soft small" id="chatPartnerMeta"></div>
                </div>
                <button class="btn btn-soft" type="button" id="btnRefreshChat">Refresh</button>
              </div>

              <div id="chatSkeleton" class="skeleton" style="height: 320px; display:none;"></div>
              <div
                id="chatBox"
                class="chat-box border rounded"
                style="height: 46vh; overflow:auto; padding: 14px; background: rgba(255,255,255,0.02);"
              ></div>

              <div class="mt-3">
                <div class="row g-2 align-items-end">
                  <div class="col-12 col-md">
                    <label class="form-label visually-hidden" for="messageContent">Message</label>
                    <textarea
                      class="form-control"
                      id="messageContent"
                      rows="2"
                      placeholder="Type your message..."
                      style="resize:none;"
                    ></textarea>
                  </div>
                  <div class="col-12 col-md-auto d-grid">
                    <button class="btn btn-brand" id="btnSendMessage" type="button">Send</button>
                  </div>
                </div>
                <div class="text-muted-soft small mt-2" id="chatHint">
                  Messages use POST <code>/api/v1/messages</code>.
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
          <div>© <span id="year"></span> Book Me Events</div>
          <div class="text-muted-soft small">Chat</div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/pages/messages.js"></script>
  </body>
</html>
