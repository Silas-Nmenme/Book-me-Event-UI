<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Book Me Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/landing-professional.css" />
  </head>

  <body>
    <div id="toastHost" class="position-fixed top-0 end-0 p-3"></div>

    <nav class="navbar navbar-dark navbar-glass sticky-top bme-navbar">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navAuthLoginContent"
          aria-controls="navAuthLoginContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div id="navAuthLoginContent" class="collapse navbar-collapse">
          <div class="ms-auto d-flex gap-2 align-items-center justify-content-end flex-wrap">
            <a class="btn btn-soft" href="auth-register.html">Sign up</a>

            <button
              id="themeToggleBtn"
              class="btn btn-soft btn-sm bme-theme-toggle"
              type="button"
              aria-label="Toggle dark/light theme"
              title="Toggle theme"
            >
              <span data-icon="sun">☀️</span>
              <span data-icon="moon">🌙</span>
            </button>
          </div>
        </div>
      </div>
    </nav>


<section class="section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-7 col-lg-5">
            <div class="card card-glass p-4 p-md-5 fade-slide">
              <div class="d-flex align-items-center justify-content-between mb-3">
                <span class="brand-pill">
                  <span class="brand-dot"></span>
                  <span class="fw-bold">Login</span>
                </span>
                <span class="badge text-bg-dark border badge-outline-brand">Secure</span>
              </div>

              <!-- NOTE: Keep this login UI identical for all roles (USER/VENDOR/ADMIN).
                   Role-specific behavior happens only after auth success + redirect. -->


              <h1 class="h4 fw-bold mb-1">Welcome back</h1>
              <div class="text-muted-soft small mb-4">Log in to request services, chat vendors, and book confidently.</div>

              <form id="loginForm" class="row g-3" autocomplete="on">
                <div class="col-12">
                  <label class="form-label" for="email">Email</label>
                  <input class="form-control" id="email" name="email" type="email" placeholder="name@example.com" required />
                </div>

                <div class="col-12">
                  <label class="form-label" for="password">Password</label>
                  <input class="form-control" id="password" name="password" type="password" placeholder="Your password" required />
                </div>

                <div class="col-12 d-flex flex-wrap gap-2 align-items-center justify-content-between">
                  <a class="text-muted-soft small" href="auth-register.html">Create account</a>
                  <a class="text-muted-soft small" href="forgot-password.html">Forgot password?</a>
                </div>

                <div class="col-12">
                  <button type="submit" class="btn btn-brand w-100" id="btnLogin">Log in</button>
                </div>

                <div class="col-12 text-center">
                  <div class="small text-muted-soft">By continuing you agree to platform guidelines.</div>
                </div>
              </form>

              <div class="mt-2 small text-muted-soft" id="loginHint"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
          <div>© <span id="year"></span> Book Me Events</div>
          <div class="text-muted-soft small">Login</div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type=module>
      import { loginUser, setToken } from '../js/api.js';
      import { toast, setYear } from '../js/ui.js';
      import { initThemeToggle } from '../js/theme-toggle.js';
      import { BACKEND_URL } from '../constant.js';

      setYear('year');
      initThemeToggle();


      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        const btn = document.getElementById('btnLogin');
        btn.disabled = true;
        const hint = document.getElementById('loginHint');
        hint.textContent = '';

        try {
          const res = await loginUser({ email, password });


          if (res?.token) setToken(res.token);

          const role = res?.data?.role || '';

          const roleUpper = (role || '').toString().toUpperCase();
          // NOTE: All roles (USER/VENDOR/ADMIN) authenticate via ONE endpoint:
          // POST /api/v1/auth/login
          // Role-specific behavior happens only after auth success + redirect.

          const next = roleUpper === 'ADMIN'
            ? 'admin-dashboard.html'
            : (roleUpper === 'VENDOR' ? 'vendor-dashboard.html' : 'user-dashboard.html');

          toast({ title: 'Logged in', message: 'Redirecting to your dashboard…', variant: 'success' });
          window.location.href = next;





        } catch (err) {
          const status = err?.status || err?.response?.status;
          const msg = status === 429 ? (err?.message || err?.data?.message || 'Too many login attempts. Try again later.') : (err?.message || 'Login failed');

          hint.textContent = msg;
          toast({ title: status === 429 ? 'Too many attempts' : 'Login failed', message: msg, variant: status === 429 ? 'warning' : 'danger' });

        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
