<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Service - Book Me Events</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div id="toastHost"></div>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-glass sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>

        <div class="ms-auto d-flex gap-2">
          <a class="btn btn-soft" href="services.html">Back</a>
          <a class="btn btn-brand" href="auth-register.html">Request</a>
        </div>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <div class="row g-4">
          <div class="col-12 col-lg-8">
            <div class="card card-glass p-4 fade-slide" id="serviceCard">
              <!-- filled by JS -->
              <div class="skeleton p-3" style="height: 220px;"></div>
            </div>
          </div>
          <div class="col-12 col-lg-4">
            <div class="card card-glass p-4 card-hover fade-slide" style="animation-delay: 70ms;">
              <div class="fw-bold mb-2">Actions</div>
              <div class="text-muted-soft small mb-3">Create a request or chat vendor.</div>

              <div class="d-grid gap-2">
                <button class="btn btn-brand" id="btnCreateRequest" type="button">Request this service</button>
                <a class="btn btn-soft" id="btnChat" href="messages.html" role="button">Chat vendor</a>
              </div>

              <hr style="border-color: rgba(255,255,255,0.12)" />

              <div class="small text-muted-soft mb-2">Service price</div>
              <div class="fs-5 fw-bold" id="priceText">—</div>

              <div class="small text-muted-soft mt-3 mb-2">Vendor</div>
              <div class="fw-bold" id="vendorText">—</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
          <div>© <span id="year"></span> Book Me Events</div>
          <div class="text-muted-soft small">Service details</div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/pages/service-details.js"></script>
  </body>
</html>
