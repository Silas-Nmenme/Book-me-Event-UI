<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Audit - Book Me Events</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
<div id="toastHost" class="bme-toast-host p-3"></div>

    <nav class="navbar navbar-dark navbar-glass sticky-top bme-navbar">
      <div class="container">
        <a class="navbar-brand" href="admin-dashboard.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>

        <div class="ms-auto d-flex gap-2 align-items-center justify-content-end flex-wrap">
          <a class="btn btn-soft btn-sm" href="admin-dashboard.html">Back</a>

          <button
            id="themeToggleBtn"
            class="btn btn-soft btn-sm bme-theme-toggle"
            type="button"
            aria-label="Toggle dark/light theme"
            title="Toggle theme"
          >
            <span data-icon="sun">☀️</span>
            <span data-icon="moon">🌙</span>
          </button>

          <button class="btn btn-soft btn-sm" type="button" id="btnLogout">Logout</button>
        </div>
      </div>
    </nav>


    <section class="section">
      <div class="container">
        <div class="card card-glass p-4 fade-slide">
          <div class="badge badge-glow mb-2">Admin audit</div>
          <h2 class="h5 fw-bold">Immutable audit log (MVP placeholder)</h2>
          <div class="text-muted-soft small mb-3">
            ActivityLog exists in the backend, but Stage 3 read-only admin governance endpoints are not yet wired.
          </div>

          <div class="row g-3 mb-3">
            <div class="col-12 col-md-4">
              <label class="form-label">Filter entityType</label>
              <input id="filterEntityType" class="form-control" placeholder="e.g., VENDOR" />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Filter actionType</label>
              <input id="filterActionType" class="form-control" placeholder="e.g., VENDOR_KYC_APPROVED" />
            </div>
            <div class="col-12 col-md-4 d-flex align-items-end">
              <button id="btnRefresh" class="btn btn-primary w-100" type="button">Load audit</button>
            </div>
          </div>

          <div id="errorBox" class="alert alert-danger d-none"></div>
          <div id="loadingBox" class="text-muted-soft small">Loading…</div>

          <div id="signalsRoot" class="d-none">
            <div class="table-responsive bme-scroll-panel mt-2">
              <table class="table table-dark table-hover">
                <thead>
                  <tr>
                    <th>Entity</th>
                    <th>Action</th>
                    <th>User</th>
                    <th>Actor</th>
                    <th>EntityId</th>
                    <th>Severity</th>
                    <th>Occurred</th>
                  </tr>
                </thead>
                <tbody id="auditBody"></tbody>
              </table>
            </div>
          </div>

        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
          <div>© <span id="year"></span> Book Me Events</div>
          <div class="text-muted-soft small">Admin</div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
      import { setYear } from '../js/ui.js';
      import { initThemeToggle } from '../js/theme-toggle.js';

      setYear('year');
      initThemeToggle();

      // Theme-only page wrapper; existing module handles audit logic.
    </script>

    <script src="../js/pages/admin-audit.js" type="module"></script>
  </body>
</html>
