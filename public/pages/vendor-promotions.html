<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vendor Promotions - Book Me Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/landing-professional.css" />
  </head>
  <body>
    <div id="toastHost" class="position-fixed top-0 end-0 p-3"></div>

    <nav class="navbar navbar-dark navbar-glass sticky-top bme-navbar">
      <div class="container">
        <a class="navbar-brand" href="vendor-dashboard.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>

        <div class="ms-auto d-flex gap-2 align-items-center justify-content-end flex-wrap">
          <a class="btn btn-soft" href="vendor-dashboard.html">Back</a>

          <button
            id="themeToggleBtn"
            class="btn btn-soft bme-theme-toggle"
            type="button"
            aria-label="Toggle dark/light theme"
            title="Toggle theme"
          >
            <span data-icon="sun">☀️</span>
            <span data-icon="moon">🌙</span>
          </button>
        </div>
      </div>
    </nav>


    <section class="section">
      <div class="container">
        <div class="row g-4">
          <div class="col-12 col-lg-5">
            <div class="card card-glass p-4 fade-slide">
              <div class="badge badge-glow">Create promotion</div>
              <h1 class="h5 fw-bold mt-2 mb-3">MVP promotion</h1>

              <div class="alert alert-danger d-none" id="err"></div>

              <form id="promoForm" autocomplete="off">
                <div class="mb-3">
                  <label class="form-label">Title</label>
                  <input class="form-control" id="title" required maxlength="120" title="Promotion title" placeholder="e.g. 10% off" />
                </div>
                <div class="mb-3">
                  <label class="form-label">Description</label>
                  <textarea class="form-control" id="description" required rows="4" maxlength="2000"></textarea>
                </div>
                <div class="mb-3">
                  <label class="form-label">Service category (optional)</label>
                  <input class="form-control" id="serviceCategory" maxlength="80" placeholder="e.g. Catering" />
                </div>

                <div class="row g-3 mb-3">
                  <div class="col-12 col-md-6">
                    <label class="form-label">Discount % (optional)</label>
                    <input class="form-control" id="discountPercent" type="number" min="0" max="100" placeholder="e.g. 10" />
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label">Fixed amount (optional)</label>
                    <input class="form-control" id="fixedAmount" type="number" min="0" step="0.01" placeholder="e.g. 5000" />
                  </div>
                </div>

                <div class="row g-3 mb-3">
                  <div class="col-6">
                    <label class="form-label" for="startDate">Start</label>
                    <input class="form-control" id="startDate" type="date" required title="Start date" />
                  </div>
                  <div class="col-6">
                    <label class="form-label" for="endDate">End</label>
                    <input class="form-control" id="endDate" type="date" required title="End date" />
                  </div>
                </div>



                <button class="btn btn-brand w-100" type="submit">Save promotion</button>
              </form>
            </div>
          </div>

          <div class="col-12 col-lg-7">
            <div class="card card-glass p-4 fade-slide">
              <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
                <div>
                  <div class="badge badge-glow">Your promotions</div>
                  <h1 class="h5 fw-bold mt-2 mb-0">List</h1>
                </div>
                <button class="btn btn-soft" type="button" id="btnRefresh">Refresh</button>
              </div>

              <div class="mt-3 text-muted-soft small">Active promotions show publicly. This MVP supports CRUD.</div>

              <div id="promoList" class="row g-3 mt-1"></div>
              <div id="promoEmpty" class="text-muted-soft small d-none mt-3">No promotions yet.</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { apiFetch, fetchMe } from '../js/api.js';
      import { toast, setYear } from '../js/ui.js';
      import { initThemeToggle } from '../js/theme-toggle.js';
      import { initNavbarBrandRoleRedirect } from '../js/role-redirect.js';

      setYear('year');
      initThemeToggle();
      initNavbarBrandRoleRedirect();

      const errEl = document.getElementById('err');
      const promoListEl = document.getElementById('promoList');
      const promoEmptyEl = document.getElementById('promoEmpty');

      function escapeHtml(s) {
        return (s ?? '').toString().replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'<','>':'>','"':'"',"'":'&#039;' }[c] || c));
      }

      function renderPromo(p) {
        return `
          <div class="col-12">
            <div class="card card-glass p-3">
              <div class="d-flex align-items-start justify-content-between gap-2">
                <div>
                  <div class="fw-bold">${escapeHtml(p.title)}</div>
                  <div class="small text-muted-soft">${escapeHtml(p.description)}</div>
                  <div class="small mt-1">Active: ${p.isActive ? 'Yes' : 'No'}</div>
                  <div class="small">Dates: ${p.startDate ? new Date(p.startDate).toLocaleDateString() : '—'} → ${p.endDate ? new Date(p.endDate).toLocaleDateString() : '—'}</div>
                </div>
                <div class="text-end">
                  <button class="btn btn-danger btn-sm" type="button" data-del="${encodeURIComponent(p._id)}">Delete</button>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      async function loadPromos() {
        promoListEl.innerHTML = '';
        promoEmptyEl.classList.add('d-none');
        try {
          await fetchMe();
          const res = await apiFetch('/api/v1/vendors/promotions', { method: 'GET' });
          const data = res?.data || res;
          const items = data?.data || data?.items || data || [];

          if (!Array.isArray(items) || items.length === 0) {
            promoEmptyEl.classList.remove('d-none');
            return;
          }

          promoListEl.innerHTML = items.map(renderPromo).join('');

          promoListEl.querySelectorAll('[data-del]').forEach((btn) => {
            btn.addEventListener('click', async () => {
              if (!confirm('Delete this promotion?')) return;
              try {
                await apiFetch(`/api/v1/vendors/promotions/${decodeURIComponent(btn.getAttribute('data-del'))}`, { method: 'DELETE' });
                toast({ title: 'Deleted', message: 'Promotion deleted.', variant: 'success' });
                await loadPromos();
              } catch (e) {
                toast({ title: 'Delete failed', message: e?.message || 'Try again', variant: 'danger' });
              }
            });
          });
        } catch (e) {
          errEl.classList.remove('d-none');
          errEl.textContent = e?.message || 'Failed to load promotions.';
        }
      }

      const form = document.getElementById('promoForm');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errEl.classList.add('d-none');

        const payload = {
          title: document.getElementById('title').value.trim(),
          description: document.getElementById('description').value.trim(),
          serviceCategory: document.getElementById('serviceCategory').value.trim() || undefined,
          discountPercent: document.getElementById('discountPercent').value || undefined,
          fixedAmount: document.getElementById('fixedAmount').value || undefined,
          startDate: document.getElementById('startDate').value,
          endDate: document.getElementById('endDate').value,
        };

        try {
          await apiFetch('/api/v1/vendors/promotions', {
            method: 'POST',
            body: JSON.stringify(payload),
          });
          toast({ title: 'Saved', message: 'Promotion created.', variant: 'success' });
          form.reset();
          await loadPromos();
        } catch (e2) {
          errEl.classList.remove('d-none');
          errEl.textContent = e2?.message || 'Failed to save promotion.';
        }
      });

      document.getElementById('btnRefresh')?.addEventListener('click', loadPromos);

      await loadPromos();
    </script>
  </body>
</html>
