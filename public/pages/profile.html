<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Your Profile - Book Me Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/landing-professional.css" />
  </head>

  <body>
    <div id="toastHost" class="position-fixed top-0 end-0 p-3"></div>

    <nav class="navbar navbar-dark navbar-glass sticky-top bme-navbar">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navProfileContent"
          aria-controls="navProfileContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div id="navProfileContent" class="collapse navbar-collapse">
          <div class="ms-auto d-flex gap-2 align-items-center justify-content-end flex-wrap">
            <button
              id="themeToggleBtn"
              class="btn btn-soft btn-sm bme-theme-toggle"
              type="button"
              aria-label="Toggle dark/light theme"
              title="Toggle theme"
            >
              <span data-icon="sun">☀️</span>
              <span data-icon="moon">🌙</span>
            </button>

            <button class="btn btn-soft" id="btnLogout" type="button">Logout</button>
          </div>
        </div>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-7">
            <div class="card card-glass p-4 p-md-5">
              <div class="d-flex align-items-center justify-content-between mb-3 gap-3">
                <div>
                  <div class="badge badge-glow text-white mb-2">Redirecting</div>
                  <h1 class="h4 fw-bold mb-1" id="title">Loading your dashboard…</h1>
                  <div class="text-muted-soft small" id="subtitle">Checking your role and session.</div>
                </div>
              </div>

              <div class="progress progress-sm">
                <div class="progress-bar progress-bar-striped progress-bar-animated w-40"></div>
              </div>

              <div class="mt-3 small text-muted-soft" id="hint"></div>

              <div class="mt-4">
                <a href="auth-login.html" class="btn btn-soft w-100">Go to login</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
          <div>© <span id="year"></span> Book Me Events</div>
          <div class="text-muted-soft small">Profile</div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
      import { fetchMe, logoutUser } from '../js/api.js';
      import { clearToken } from '../js/api.js';
      import { toast, setYear } from '../js/ui.js';
      import { initThemeToggle } from '../js/theme-toggle.js';

      setYear('year');
      initThemeToggle();


      async function routeToRole() {
        const hint = document.getElementById('hint');
        try {
          const meRes = await fetchMe();
          const me = meRes?.data || meRes;
          const role = (me?.role || '').toString().toUpperCase();

          if (!role) throw new Error('Role not found');

          const map = {
            USER: 'user-dashboard.html',
            VENDOR: 'vendor-dashboard.html',
            ADMIN: 'admin-dashboard.html',
          };

          const next = map[role];
          if (!next) throw new Error('Unknown role');

          document.getElementById('title').textContent = `Welcome, ${me?.firstName || 'there'}!`;
          document.getElementById('subtitle').textContent = `Redirecting to your ${role} dashboard…`;

          window.location.href = next;
        } catch (err) {
          hint.textContent = err?.message || 'Session required.';
          toast({ title: 'Login required', message: 'Please log in again.', variant: 'danger' });
          clearToken();
          window.location.href = 'auth-login.html';
        }
      }

      document.getElementById('btnLogout').addEventListener('click', async () => {
        try { await logoutUser(); } finally { clearToken(); }
        toast({ title: 'Logged out', message: 'See you again.', variant: 'success' });
        window.location.href = 'auth-login.html';
      });

      routeToRole();
    </script>
  </body>
</html>
