<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password - Book Me Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>
    <div id="toastHost" class="position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>

    <nav class="navbar navbar-dark navbar-glass sticky-top bme-navbar">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>
        <div class="ms-auto d-flex gap-2">
          <a class="btn btn-soft" href="auth-login.html">Back to login</a>

          <button
            id="themeToggleBtn"

            class="btn btn-soft btn-sm bme-theme-toggle"
            type="button"
            aria-label="Toggle dark/light theme"
            title="Toggle theme"
          >
            <span class="visually-hidden">Toggle theme</span>

            <span data-icon="sun" style="display:none;">☀️</span>
            <span data-icon="moon" style="display:inline-flex;">🌙</span>
          </button>
        </div>

      </div>
    </nav>

    <section class="section" style="padding-top:72px; padding-bottom:64px;">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-6">
            <div class="card card-glass p-4 p-md-5 fade-slide">
              <h1 class="h4 fw-bold mb-1">Set a new password</h1>
              <div class="text-muted-soft small mb-4">Choose a strong password for your account.</div>

              <form id="resetForm" class="row g-3" autocomplete="on">
                <input type="hidden" id="token" />

                <div class="col-12">
                  <label class="form-label" for="password">New password</label>
                  <input class="form-control" id="password" name="password" type="password" placeholder="Create a new password" required />
                </div>

                <div class="col-12">
                  <label class="form-label" for="passwordConfirm">Confirm new password</label>
                  <input class="form-control" id="passwordConfirm" name="passwordConfirm" type="password" placeholder="Confirm password" required />
                </div>

                <div class="col-12">
                  <button type="submit" class="btn btn-brand w-100" id="btnReset">Reset password</button>
                </div>

                <div class="col-12 small text-muted-soft" id="resetHint"></div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
          <div>© <span id="year"></span> Book Me Events</div>
          <div class="text-muted-soft small">Reset password</div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
      import { resetPassword } from '../js/api.js';
      import { toast, setYear } from '../js/ui.js';
      import { initThemeToggle } from '../js/theme-toggle.js';

      setYear('year');
      initThemeToggle();


      function getResetToken() {
        // Expected: /reset-password.html?token=... OR reset link can embed token in query.
        // If your backend email link uses direct reset endpoint, adjust accordingly.
        const url = new URL(window.location.href);
        return url.searchParams.get('token') || '';
      }

      document.getElementById('token').value = getResetToken();

      document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const token = document.getElementById('token').value;
        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('passwordConfirm').value;
        const btn = document.getElementById('btnReset');
        const hint = document.getElementById('resetHint');

        btn.disabled = true;
        hint.textContent = '';

        try {
          if (!token) throw new Error('Missing reset token');
          await resetPassword({ token, password, passwordConfirm });

          toast({ title: 'Password updated', message: 'You can now log in.', variant: 'success' });
          window.location.href = 'auth-login.html';
        } catch (err) {
          toast({ title: 'Reset failed', message: err?.message || 'Try again.', variant: 'danger' });
          hint.textContent = err?.message || 'Failed';
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
