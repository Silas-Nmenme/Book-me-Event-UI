<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vendor registration - Page 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>
    <div id="toastHost" class="position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>

    <nav class="navbar navbar-dark navbar-glass sticky-top bme-navbar">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>
        <div class="ms-auto d-flex gap-2">
          <a class="btn btn-soft" href="vendor-register-page1.html">Back</a>
          <a class="btn btn-soft" href="auth-login.html">Login</a>
        </div>
      </div>
    </nav>

    <section class="section" style="padding-top:72px; padding-bottom:64px;">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-10 col-lg-8">
            <div class="card card-glass p-4 p-md-5 fade-slide">
              <div class="d-flex align-items-center justify-content-between mb-3">
                <span class="brand-pill">
                  <span class="brand-dot"></span>
                  <span class="fw-bold">Vendor signup</span>
                </span>
                <span class="badge text-bg-dark border" style="border-color: rgba(124,92,255,0.45) !important;">Step 2</span>
              </div>

              <h1 class="h4 fw-bold mb-1">Create your vendor profile</h1>
              <div class="text-muted-soft small mb-4">Fill your business details, then continue to OTP verification.</div>

              <form id="vendorProfileForm" class="row g-3" autocomplete="on">
                <div class="col-12">
                  <label class="form-label" for="email">Email (same as step 1)</label>
                  <input class="form-control" id="email" name="email" type="email" required />
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label" for="businessName">Business name</label>
                  <input class="form-control" id="businessName" name="businessName" type="text" required />
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label" for="businessRegistrationNumber">Business registration number</label>
                  <input class="form-control" id="businessRegistrationNumber" name="businessRegistrationNumber" type="text" required />
                </div>

                <div class="col-12 col-md-4">
                  <label class="form-label" for="taxId">Tax ID</label>
                  <input class="form-control" id="taxId" name="taxId" type="text" />
                </div>

                <div class="col-12 col-md-4">
                  <label class="form-label" for="bankName">Bank name</label>
                  <input class="form-control" id="bankName" name="bankName" type="text" />
                </div>

                <div class="col-12 col-md-4">
                  <label class="form-label" for="bankAccountNumber">Bank account number</label>
                  <input class="form-control" id="bankAccountNumber" name="bankAccountNumber" type="text" />
                </div>

                <div class="col-12">
                  <label class="form-label" for="businessDescription">Business description</label>
                  <textarea class="form-control" id="businessDescription" name="businessDescription" rows="3" required></textarea>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label" for="serviceRendered">Service rendered (comma-separated)</label>
                  <input class="form-control" id="serviceRendered" name="serviceRendered" type="text" placeholder="Photography, Catering" />
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label" for="coverageAreas">Coverage areas (comma-separated)</label>
                  <input class="form-control" id="coverageAreas" name="coverageAreas" type="text" placeholder="Lagos, Abuja" />
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label" for="nin">NIN</label>
                  <input class="form-control" id="nin" name="nin" type="text" />
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label" for="passportPhotograph">Passport photograph (URL or file upload handled elsewhere)</label>
                  <input class="form-control" id="passportPhotograph" name="passportPhotograph" type="text" placeholder="Paste image URL or later upload" />
                </div>

                <div class="col-12">
                  <button type="submit" class="btn btn-brand w-100" id="btnVendorContinue">Continue</button>
                </div>

                <div class="col-12 small text-muted-soft" id="vendorProfileHint"></div>

                <div class="col-12 d-flex flex-wrap gap-2 align-items-center justify-content-between">
                  <a class="text-muted-soft small" href="vendor-register-page3.html">Skip to OTP (if you already saved)</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
          <div>© <span id="year"></span> Book Me Events</div>
          <div class="text-muted-soft small">Vendor signup</div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
      import { apiFetch } from '../js/api.js';
      import { toast, setYear } from '../js/ui.js';
      import { initThemeToggle } from '../js/theme-toggle.js';

      setYear('year');
      initThemeToggle();

      function splitComma(s) {
        return (s || '')
          .split(',')
          .map((x) => x.trim())
          .filter(Boolean);
      }

      document.getElementById('vendorProfileForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const payload = {
          email: document.getElementById('email').value.trim(),
          businessName: document.getElementById('businessName').value.trim(),
          businessRegistrationNumber: document.getElementById('businessRegistrationNumber').value.trim(),
          taxId: document.getElementById('taxId').value.trim(),
          bankAccountNumber: document.getElementById('bankAccountNumber').value.trim(),
          bankName: document.getElementById('bankName').value.trim(),
          businessDescription: document.getElementById('businessDescription').value.trim(),
          serviceCategories: splitComma(document.getElementById('serviceRendered').value),
          coverageAreas: splitComma(document.getElementById('coverageAreas').value),
          nin: document.getElementById('nin').value.trim(),
          passportPhotograph: document.getElementById('passportPhotograph').value.trim(),
        };

        const btn = document.getElementById('btnVendorContinue');
        btn.disabled = true;

        const hint = document.getElementById('vendorProfileHint');
        hint.textContent = '';

        try {
          await apiFetch('/api/v1/vendors/register/page2', {
            method: 'POST',
            body: JSON.stringify(payload),
          });

          toast({ title: 'Profile saved', message: 'Continue to OTP verification.', variant: 'success' });
          window.location.href = 'vendor-register-page3.html';
        } catch (err) {
          hint.textContent = err?.message || 'Failed to save profile.';
          toast({ title: 'Save failed', message: err?.message || 'Try again.', variant: 'danger' });
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
