<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Your Requests - Book Me Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>
    <div id="toastHost" class="position-fixed top-0 end-0 p-3" style="z-index:1080;"></div>

    <nav class="navbar navbar-dark navbar-glass sticky-top bme-navbar">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>

        <div class="ms-auto d-flex gap-2">
          <a class="btn btn-soft" href="user-service.html">Browse</a>
          <button
            id="themeToggleBtn"
            class="btn btn-soft btn-sm bme-theme-toggle"
            type="button"
            aria-label="Toggle dark/light theme"
            title="Toggle theme"
          >
            <span data-icon="sun" style="display:none;">☀️</span>
            <span data-icon="moon" style="display:inline-flex;">🌙</span>
          </button>
          <button class="btn btn-soft" id="btnLogout" type="button">Logout</button>
        </div>
      </div>
    </nav>

<section class="section" style="padding-top: var(--bme-navbar-height); padding-bottom:64px;">
      <div class="container">
        <div class="row g-4 align-items-start">
          <!-- SIDEBAR -->
          <div class="col-12 col-lg-4">
            <div class="card card-glass p-4 fade-slide">
              <div class="badge badge-glow mb-3">Your requests</div>
              <h2 class="h5 fw-bold mb-1" id="meName">—</h2>
              <div class="text-muted-soft" id="meEmail">—</div>
              <hr style="border-color:rgba(255,255,255,0.12)" />

              <div class="d-flex gap-3 align-items-center">
                <div
                  id="avatar"
                  class="rounded-circle border"
                  style="width:64px;height:64px;background:rgba(124,92,255,0.12);display:flex;align-items:center;justify-content:center;font-weight:900;"
                >
                  BME
                </div>

                <div>
                  <div class="small text-muted-soft">Role</div>
                  <div class="fw-bold" id="meRole">—</div>
                </div>
              </div>
            </div>

            <div class="mt-4 card card-glass p-4 fade-slide">
              <div class="fw-bold mb-2">Workflow</div>
              <div class="small text-muted-soft" id="workflowHint">—</div>
              <div class="mt-3 d-grid gap-2">
                <a class="btn btn-soft" href="user-service.html">Create from services</a>
                <a class="btn btn-soft" href="user-message.html?requestId=${encodeURIComponent(id)}">Messages</a>
                <a class="btn btn-soft" href="bookings.html">Bookings</a>
              </div>
            </div>
          </div>

          <!-- MAIN -->
          <div class="col-12 col-lg-8">
            <div class="card card-glass p-4 fade-slide" style="min-height:340px;">
              <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
                <div>
                  <div class="badge badge-glow text-white mb-2">Manage</div>
                  <h3 class="h5 fw-bold mb-0">Create, edit & delete requests</h3>
                </div>
              </div>

              <div id="contentArea">
                <div id="authzError" class="alert alert-danger d-none" role="alert"></div>
                <div id="roleNotice" class="alert alert-info d-none" role="alert"></div>

                <div id="requestsShell" class="d-none">
                  <div class="row g-4">
                    <!-- CREATE -->
                    <div class="col-12">
                      <div class="card card-glass p-3">
                        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-2">
                          <div>
                            <div class="fw-bold">Create request</div>
                            <div class="small text-muted-soft">Manual form (no service id field).</div>
                          </div>

                          <button class="btn btn-soft" id="btnResetForm" type="button">Clear</button>
                        </div>

                        <form id="createRequestForm" autocomplete="off">
                          <div class="row g-3">
                            <div class="col-12 col-md-6">
                              <label for="serviceSelect" class="form-label">Service you sort after *</label>
                              <select id="serviceSelect" class="form-select" required>
                                <option value="">Select a service</option>
                              </select>
                            </div>

                            <div class="col-12 col-md-6">
                              <label for="eventDate" class="form-label">Event Date *</label>
                              <input type="date" class="form-control" id="eventDate" required />
                            </div>

                            <div class="col-12 col-md-4">
                              <label for="guestCount" class="form-label">Guest Count</label>
                              <input type="number" class="form-control" id="guestCount" min="1" />
                            </div>

                            <div class="col-12 col-md-4">
                              <label for="budgetAmount" class="form-label">Budget Amount</label>
                              <input type="number" class="form-control" id="budgetAmount" min="0" step="0.01" />
                            </div>

                            <div class="col-12 col-md-4">
                              <label for="budgetCurrency" class="form-label">Budget Currency</label>
                              <input type="text" class="form-control" id="budgetCurrency" value="NGN" />
                            </div>

                            <div class="col-12">
                              <label for="eventLocation" class="form-label">Event Location *</label>
                              <input
                                type="text"
                                class="form-control"
                                id="eventLocation"
                                placeholder="Enter event venue/location"
                                required
                              />
                            </div>

                            <div class="col-12">
                              <label for="eventDescription" class="form-label">Event Description *</label>
                              <textarea
                                class="form-control"
                                id="eventDescription"
                                rows="4"
                                placeholder="Describe the event requirements"
                                required
                              ></textarea>
                            </div>

                            <div class="col-12">
                              <label for="notes" class="form-label">Notes</label>
                              <textarea class="form-control" id="notes" rows="3" placeholder="Additional notes"></textarea>
                            </div>
                          </div>

                          <div class="mt-3 d-flex flex-wrap gap-2">
                            <button type="submit" class="btn btn-brand" id="btnSubmit">Create request</button>
                          </div>
                        </form>
                      </div>
                    </div>

                    <!-- LIST -->
                    <div class="col-12">
                      <div class="card card-glass p-3">
                        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-2">
                          <div>
                            <div class="fw-bold">Your requests</div>
                            <div class="small text-muted-soft">Edit or delete requests you created.</div>
                          </div>
                        </div>

                        <div id="requestList" class="row g-3"></div>
                        <div id="noRequests" class="text-muted-soft small d-none" style="margin-top:12px;">
                          No requests found.
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
          <div>© <span id="year"></span> Book Me Events</div>
          <div class="text-muted-soft small">Your Requests</div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
      import { fetchMe, logoutUser, clearToken } from '../js/api.js';
      import { toast, setYear } from '../js/ui.js';
      import { initThemeToggle } from '../js/theme-toggle.js';
      import { initNavbarBrandRoleRedirect } from '../js/role-redirect.js';
      import { initUserRequestPage } from '../js/pages/user-request.js';

      setYear('year');
      initThemeToggle();
      initNavbarBrandRoleRedirect();

      const avatarEl = document.getElementById('avatar');

      function setAvatarUrl(url) {
        if (!avatarEl) return;
        if (url) {
          avatarEl.style.backgroundImage = `url(${url})`;
          avatarEl.style.backgroundSize = 'cover';
          avatarEl.style.backgroundPosition = 'center';
          avatarEl.textContent = '';
          avatarEl.style.fontWeight = 'normal';
          return;
        }
        avatarEl.style.backgroundImage = '';
        avatarEl.textContent = 'BME';
        avatarEl.style.fontWeight = '900';
      }

      function getAvatarInitials(name) {
        return (name || 'BME')
          .split(' ')
          .filter(Boolean)
          .slice(0, 2)
          .map((x) => x[0].toUpperCase())
          .join('');
      }

      async function loadMe() {
        try {
          const res = await fetchMe();
          const me = res?.data || res;
          document.getElementById('meName').textContent = me?.firstName
            ? `${me.firstName} ${me.lastName || ''}`.trim()
            : '—';
          document.getElementById('meEmail').textContent = me?.email || '—';

          const role = (me?.role || me?.user?.role || 'USER').toString().toUpperCase();
          document.getElementById('meRole').textContent = role;

          if (me?.profilePicture) setAvatarUrl(me.profilePicture);
          else {
            avatarEl.textContent = getAvatarInitials(me?.firstName || 'BME');
            avatarEl.style.backgroundImage = '';
            avatarEl.style.background = 'rgba(124,92,255,0.12)';
          }

          return { me, role };
        } catch {
          clearToken();
          toast({ title: 'Session expired', message: 'Please log in again.', variant: 'danger' });
          window.location.href = 'auth-login.html';
          return null;
        }
      }

      document.getElementById('btnLogout').addEventListener('click', async () => {
        try {
          await logoutUser();
        } finally {
          clearToken();
        }
        toast({ title: 'Logged out', message: 'See you again.', variant: 'success' });
        window.location.href = 'auth-login.html';
      });

      const meRes = await loadMe();
      if (meRes) await initUserRequestPage(meRes);
    </script>
  </body>
</html>
