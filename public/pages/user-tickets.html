<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Tickets - Book Me Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/landing-professional.css" />
  </head>

  <body>
    <div id="toastHost" class="position-fixed top-0 end-0 p-3"></div>

    <nav class="navbar navbar-dark navbar-glass sticky-top bme-navbar">
      <div class="container">
        <a class="navbar-brand" href="user-dashboard.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navUserTicketsContent"
          aria-controls="navUserTicketsContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div id="navUserTicketsContent" class="collapse navbar-collapse">
          <div class="ms-auto d-flex gap-2 align-items-center justify-content-end flex-wrap">
            <a class="btn btn-soft" href="user-dashboard.html">Dashboard</a>
            <a class="btn btn-soft" href="user-activity.html">Activity</a>

            <button
              id="themeToggleBtn"
              class="btn btn-soft bme-theme-toggle"
              type="button"
              aria-label="Toggle dark/light theme"
              title="Toggle theme"
            >
              <span data-icon="sun">☀️</span>
              <span data-icon="moon">🌙</span>
            </button>

            <button class="btn btn-soft" id="btnLogout" type="button">Logout</button>
          </div>
        </div>

      </div>
    </nav>

    <section class="section">
      <div class="container">
        <div class="row g-4 align-items-start">
          <div class="col-12 col-lg-4">
            <div class="card card-glass p-4 fade-slide">
              <div class="badge badge-glow mb-3">Support tickets</div>
              <h2 class="h5 fw-bold mb-1" id="ticketsTitle">Create a ticket</h2>
              <div class="text-muted-soft small mb-3">Get help about requests, bookings, payments, or chats.</div>

              <div class="alert alert-info d-none" id="formInfo" role="alert"></div>
              <div class="alert alert-danger d-none" id="formError" role="alert"></div>

              <form id="ticketForm" autocomplete="off">
                <div class="mb-3">
                  <label class="form-label">Subject</label>
                  <input class="form-control" id="ticketSubject" type="text" required maxlength="140" title="Subject" />
                </div>

                <div class="mb-3">
                  <label class="form-label">Priority</label>
                  <select class="form-select" id="ticketPriority" title="Priority">
                    <option value="LOW">LOW</option>
                    <option value="MEDIUM" selected>MEDIUM</option>
                    <option value="HIGH">HIGH</option>
                  </select>
                </div>

                <div class="mb-3">
                  <label class="form-label">Description</label>
                  <textarea class="form-control" id="ticketDescription" rows="5" required maxlength="2000" title="Description"></textarea>
                </div>

                <div class="mb-3">
                  <label class="form-label">Link to (optional)</label>
                  <input class="form-control" id="ticketRequestId" type="text" placeholder="Request ID" title="Request ID" />
                  <div class="small text-muted-soft mt-1">You can paste a Request ID if applicable.</div>
                </div>

                <div class="mb-3">
                  <input class="form-control" id="ticketBookingId" type="text" placeholder="Booking ID" title="Booking ID" />
                </div>

                <button class="btn btn-brand w-100" type="submit" id="btnSubmitTicket">Submit ticket</button>
              </form>
            </div>
          </div>

          <div class="col-12 col-lg-8">
            <div class="card card-glass p-4 fade-slide">
              <div class="d-flex align-items-center justify-content-between gap-3 mb-3 flex-wrap">
                <div>
                  <div class="badge badge-glow text-white">Your tickets</div>
                  <h3 class="h5 fw-bold mt-2 mb-0">Recent support requests</h3>
                </div>
                <div class="d-flex gap-2 align-items-center">
                  <select id="statusFilter" class="form-select form-select-sm" style="min-width: 160px;" title="Filter by status">
                    <option value="">All statuses</option>
                    <option value="OPEN">OPEN</option>
                    <option value="IN_PROGRESS">IN_PROGRESS</option>
                    <option value="RESOLVED">RESOLVED</option>
                    <option value="CLOSED">CLOSED</option>
                  </select>
                  <button id="btnRefresh" class="btn btn-soft btn-sm" type="button">Refresh</button>
                </div>
              </div>

              <div id="ticketsError" class="alert alert-danger d-none" role="alert"></div>
              <div id="ticketsLoading" class="text-muted-soft small">Loading…</div>

              <div id="ticketsList" class="row g-3 mt-1"></div>
              <div id="ticketsEmpty" class="text-muted-soft small d-none mt-3">No tickets found.</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { fetchMe, logoutUser, clearToken, apiFetch } from '../js/api.js';
      import { toast, setYear } from '../js/ui.js';
      import { initThemeToggle } from '../js/theme-toggle.js';
      import { initNavbarBrandRoleRedirect } from '../js/role-redirect.js';

      setYear('year');
      initThemeToggle();
      initNavbarBrandRoleRedirect();

      document.getElementById('btnLogout')?.addEventListener('click', async () => {
        try { await logoutUser(); } finally { clearToken(); }
        toast({ title: 'Logged out', message: 'See you again.', variant: 'success' });
        window.location.href = 'auth-login.html';
      });

      const form = document.getElementById('ticketForm');
      const subjectEl = document.getElementById('ticketSubject');
      const descEl = document.getElementById('ticketDescription');
      const priorityEl = document.getElementById('ticketPriority');
      const requestIdEl = document.getElementById('ticketRequestId');
      const bookingIdEl = document.getElementById('ticketBookingId');

      const formInfo = document.getElementById('formInfo');
      const formError = document.getElementById('formError');

      const listEl = document.getElementById('ticketsList');
      const emptyEl = document.getElementById('ticketsEmpty');
      const errEl = document.getElementById('ticketsError');
      const loadingEl = document.getElementById('ticketsLoading');
      const statusFilterEl = document.getElementById('statusFilter');
      const btnRefresh = document.getElementById('btnRefresh');

      function escapeHtml(s) {
        return (s ?? '')
          .toString()
          .replace(/[&<>\"']/g, (c) => {
            const m = { '&': '&amp;', '<': '<', '>': '>', '\"': '"', "'": '&#039;' };
            return m[c] || c;
          });
      }

      function renderTicket(t) {
        const status = escapeHtml(t?.status || 'OPEN');
        const priority = escapeHtml(t?.priority || 'MEDIUM');
        const subject = escapeHtml(t?.subject || 'Ticket');
        const createdAt = t?.createdAt ? new Date(t.createdAt).toLocaleString() : '—';
        return `
          <div class="col-12">
            <a class="text-decoration-none" href="user-ticket-details.html?ticketId=${encodeURIComponent(t?._id || '')}">
              <div class="card card-glass p-3 card-hover">
                <div class="d-flex align-items-start justify-content-between gap-2 flex-wrap">
                  <div>
                    <div class="fw-bold">${subject}</div>
                    <div class="small text-muted-soft mt-1">${escapeHtml(createdAt)}</div>
                    <div class="small text-muted-soft mt-1">Request: ${escapeHtml(t?.request?._id || '—')} • Booking: ${escapeHtml(t?.booking?._id || '—')}</div>
                  </div>
                  <div class="text-end">
                    ${(() => {
                      const statusNorm = (status || '').toString().toLowerCase();
                      const pillClass =
                        statusNorm === 'open'
                          ? 'bme-pill--pending'
                          : statusNorm === 'in_progress' || statusNorm === 'in progress'
                            ? 'bme-pill--pending'
                            : statusNorm === 'resolved' || statusNorm === 'closed'
                              ? 'bme-pill--confirmed'
                              : 'bme-pill--cancelled';
                      return `<span class="bme-pill ${pillClass}">${status}</span>`;
                    })()}
                    <span class="bme-pill bme-pill--confirmed">${priority}</span>

                  </div>
                </div>
              </div>
            </a>
          </div>
        `;
      }

      async function loadTickets() {
        listEl.innerHTML = '';
        emptyEl.classList.add('d-none');
        errEl.classList.add('d-none');

        loadingEl.classList.remove('d-none');
        loadingEl.textContent = 'Loading…';

        try {
          const status = statusFilterEl.value;
          const qs = new URLSearchParams();
          if (status) qs.set('status', status);
          qs.set('page', 1);
          qs.set('limit', 50);

          const res = await apiFetch(`/api/v1/tickets/me?${qs.toString()}`, { method: 'GET' });
          const data = res?.data || res;
          const items = data?.data || data?.items || [];

          if (!Array.isArray(items) || items.length === 0) {
            emptyEl.classList.remove('d-none');
            return;
          }

          listEl.innerHTML = items.map(renderTicket).join('');
        } catch (e) {
          errEl.classList.remove('d-none');
          errEl.textContent = e?.message || 'Failed to load tickets.';
        } finally {
          loadingEl.classList.add('d-none');
        }
      }

      form?.addEventListener('submit', async (e) => {
        e.preventDefault();
        formInfo?.classList.add('d-none');
        formError?.classList.add('d-none');

        const payload = {
          subject: subjectEl.value.trim(),
          description: descEl.value.trim(),
          priority: priorityEl.value,
        };

        const requestId = requestIdEl.value.trim();
        const bookingId = bookingIdEl.value.trim();
        if (requestId) payload.request = requestId;
        if (bookingId) payload.booking = bookingId;

        try {
          const btn = document.getElementById('btnSubmitTicket');
          btn.disabled = true;
          btn.textContent = 'Submitting…';

          await apiFetch('/api/v1/tickets', {
            method: 'POST',
            body: JSON.stringify(payload),
          });

          toast({ title: 'Submitted', message: 'Ticket created successfully.', variant: 'success' });
          form.reset();
          await loadTickets();
        } catch (err) {
          formError?.classList.remove('d-none');
          formError.textContent = err?.message || 'Failed to submit ticket.';
        } finally {
          const btn = document.getElementById('btnSubmitTicket');
          btn.disabled = false;
          btn.textContent = 'Submit ticket';
        }
      });

      btnRefresh?.addEventListener('click', loadTickets);

      // Auth check
      await fetchMe().catch(() => {
        clearToken();
        window.location.href = 'auth-login.html';
      });

      await loadTickets();
    </script>
  </body>
</html>
