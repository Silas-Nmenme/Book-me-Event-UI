<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Activity - Book Me Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/landing-professional.css" />
  </head>
  <body>
    <div id="toastHost" class="position-fixed top-0 end-0 p-3"></div>

    <nav class="navbar navbar-dark navbar-glass sticky-top bme-navbar">
      <div class="container">
        <a class="navbar-brand" href="user-dashboard.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navUserActivityContent"
          aria-controls="navUserActivityContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div id="navUserActivityContent" class="collapse navbar-collapse">
          <div class="ms-auto d-flex gap-2 align-items-center justify-content-end flex-wrap">
            <a class="btn btn-soft" href="user-dashboard.html">Dashboard</a>
            <a class="btn btn-soft" href="bookings.html">Bookings</a>
            <a class="btn btn-soft" href="announcements.html">Announcements</a>
            <button class="btn btn-soft" id="btnLogout" type="button">Logout</button>
          </div>
        </div>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <div class="row g-4 align-items-start">
          <div class="col-12 col-lg-4">
            <div class="card card-glass p-4 fade-slide">
              <div class="badge badge-glow mb-3">Activity</div>
              <h2 class="h5 fw-bold mb-1" id="meName">—</h2>
              <div class="text-muted-soft" id="meEmail">—</div>
              <hr />
              <div class="d-flex gap-3 align-items-center">
                <div id="avatar" class="rounded-circle border bme-avatar">BME</div>
                <div>
                  <div class="small text-muted-soft">Role</div>
                  <div class="fw-bold" id="meRole">USER</div>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12 col-lg-8">
            <div class="card card-glass p-4 fade-slide">
              <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
                <div>
                  <div class="badge badge-glow text-white mb-2">Your activity timeline</div>
                  <h3 class="h5 fw-bold mb-0">Actions on bookings, payments and chats</h3>
                </div>
              </div>

              <div class="d-flex flex-wrap gap-2 align-items-center mb-2">
                <select id="pageSizeSelect" class="form-select form-select-sm" style="min-width: 140px;" title="Items per page">
                  <option value="10">10 items</option>
                  <option value="20" selected>20 items</option>
                  <option value="50">50 items</option>
                </select>
                <button id="btnRefresh" class="btn btn-soft btn-sm" type="button">Refresh</button>
              </div>

              <div id="authzError" class="alert alert-danger d-none" role="alert"></div>
              <div id="loading" class="text-muted-soft small">Loading…</div>
              <div id="error" class="text-danger small d-none"></div>

              <div class="mt-3 table-responsive bme-scroll-panel">
                <table class="table table-dark table-hover">
                  <thead>
                    <tr>
                      <th>When</th>
                      <th>Type</th>
                      <th>Entity</th>
                      <th>Details</th>
                    </tr>
                  </thead>
                  <tbody id="activityBody"></tbody>
                </table>
              </div>

              <div id="empty" class="text-muted-soft small d-none">No activity yet.</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { fetchMe, logoutUser, clearToken, apiFetch } from '../js/api.js';
      import { toast, setYear } from '../js/ui.js';
      import { initNavbarBrandRoleRedirect } from '../js/role-redirect.js';

      setYear('year');
      initNavbarBrandRoleRedirect();

      const avatarEl = document.getElementById('avatar');
      const authzErrorEl = document.getElementById('authzError');
      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const tbodyEl = document.getElementById('activityBody');
      const emptyEl = document.getElementById('empty');

      function setAvatarUrl(url) {
        if (!avatarEl) return;
        if (url) {
          avatarEl.style.backgroundImage = `url(${url})`;
          avatarEl.style.backgroundSize = 'cover';
          avatarEl.style.backgroundPosition = 'center';
          avatarEl.textContent = '';
          avatarEl.style.fontWeight = 'normal';
          return;
        }
        avatarEl.textContent = 'BME';
        avatarEl.style.backgroundImage = '';
        avatarEl.style.background = 'rgba(124,92,255,0.12)';
      }

      async function loadMe() {
        const res = await fetchMe();
        const me = res?.data || res;
        const role = (me?.role || '').toString().toUpperCase();

        document.getElementById('meName').textContent = me?.firstName
          ? `${me.firstName} ${me.lastName || ''}`.trim()
          : '—';
        document.getElementById('meEmail').textContent = me?.email || '—';
        document.getElementById('meRole').textContent = role || 'USER';
        setAvatarUrl(me?.profilePicture || null);

        if (role !== 'USER') {
          authzErrorEl.classList.remove('d-none');
          authzErrorEl.textContent = 'USER access required.';
          throw new Error('Forbidden');
        }

        return me;
      }

      function fmtDate(d) {
        if (!d) return '—';
        const dt = new Date(d);
        if (Number.isNaN(dt.getTime())) return '—';
        return dt.toLocaleString();
      }

      function safeJson(o) {
        try { return JSON.stringify(o || {}); } catch { return ''; }
      }

      async function loadActivity() {
        loadingEl.classList.remove('d-none');
        errorEl.classList.add('d-none');
        emptyEl.classList.add('d-none');
        tbodyEl.innerHTML = '';

        try {
          const pageSize = document.getElementById('pageSizeSelect').value || 20;
          const res = await apiFetch(`/api/v1/users/activity?page=1&limit=${encodeURIComponent(pageSize)}` , { method: 'GET' });
          const data = res?.data || res;
          const items = data?.data || data?.items || [];

          if (!Array.isArray(items) || items.length === 0) {
            emptyEl.classList.remove('d-none');
            return;
          }

          tbodyEl.innerHTML = items.map((x) => {
            return `
              <tr>
                <td>${fmtDate(x?.occurredAt || x?.createdAt)}</td>
                <td>${(x?.actionType || '—').toString()}</td>
                <td>${(x?.entityType || '—').toString()}</td>
                <td><code class="text-break">${safeJson(x?.metadata)}</code></td>
              </tr>
            `;
          }).join('');
        } catch (e) {
          errorEl.classList.remove('d-none');
          errorEl.textContent = e?.message || 'Failed to load activity.';
        } finally {
          loadingEl.classList.add('d-none');
        }
      }

      document.getElementById('btnLogout')?.addEventListener('click', async () => {
        try { await logoutUser(); } finally { clearToken(); }
        toast({ title: 'Logged out', message: 'See you again.', variant: 'success' });
        window.location.href = 'auth-login.html';
      });

      document.getElementById('btnRefresh')?.addEventListener('click', loadActivity);

      await loadMe();
      await loadActivity();
    </script>
  </body>
</html>
