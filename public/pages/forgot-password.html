<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forgot Password - Book Me Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>
    <div id="toastHost" class="position-fixed top-0 end-0 p-3"></div>

    <nav class="navbar navbar-dark navbar-glass sticky-top bme-navbar">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navForgotPasswordContent"
          aria-controls="navForgotPasswordContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div id="navForgotPasswordContent" class="collapse navbar-collapse">
          <div class="ms-auto d-flex gap-2 align-items-center justify-content-end flex-wrap">
            <a class="btn btn-soft" href="auth-login.html">Back to login</a>

            <button
              id="themeToggleBtn"
              class="btn btn-soft btn-sm bme-theme-toggle"
              type="button"
              aria-label="Toggle dark/light theme"
              title="Toggle theme"
            >
              <span data-icon="sun">☀️</span>
              <span data-icon="moon">🌙</span>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-6">
            <div class="card card-glass p-4 p-md-5 fade-slide">
              <h1 class="h4 fw-bold mb-1">Reset your password</h1>
              <div class="text-muted-soft small mb-4">Enter your email and we’ll send a reset link.</div>

              <form id="forgotForm" class="row g-3" autocomplete="on">
                <div class="col-12">
                  <label class="form-label" for="email">Email</label>
                  <input class="form-control" id="email" name="email" type="email" placeholder="name@example.com" required />
                </div>

                <div class="col-12">
                  <button type="submit" class="btn btn-brand w-100" id="btnSend">Send reset link</button>
                </div>

                <div class="col-12 small text-muted-soft" id="forgotHint"></div>

                <div class="col-12 text-center">
                  <a class="text-muted-soft small" href="auth-login.html">Remembered? Login</a>
                </div>
              </form>

            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
          <div>© <span id="year"></span> Book Me Events</div>
          <div class="text-muted-soft small">Forgot password</div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
      import { forgotPassword } from '../js/api.js';
      import { toast, setYear } from '../js/ui.js';
      import { initThemeToggle } from '../js/theme-toggle.js';

      setYear('year');
      initThemeToggle();


      document.getElementById('forgotForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const btn = document.getElementById('btnSend');
        const hint = document.getElementById('forgotHint');
        btn.disabled = true;
        hint.textContent = '';

        try {
          await forgotPassword({ email });
          toast({ title: 'Check your email', message: 'If the email exists, we sent a reset link.', variant: 'success' });
          hint.textContent = 'If the email exists, a reset link has been sent.';
        } catch (err) {
          toast({ title: 'Request failed', message: err?.message || 'Try again.', variant: 'danger' });
          hint.textContent = err?.message || 'Failed';
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
