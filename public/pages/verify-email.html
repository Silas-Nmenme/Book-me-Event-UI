<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Verify Email - Book Me Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>
    <div id="toastHost" class="position-fixed top-0 end-0 p-3"></div>

    <nav class="navbar navbar-dark navbar-glass sticky-top bme-navbar">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navVerifyEmailContent"
          aria-controls="navVerifyEmailContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div id="navVerifyEmailContent" class="collapse navbar-collapse">
          <div class="ms-auto d-flex gap-2 align-items-center justify-content-end flex-wrap">
            <a class="btn btn-soft" href="auth-login.html">Back to login</a>

            <button
              id="themeToggleBtn"
              class="btn btn-soft btn-sm bme-theme-toggle"
              type="button"
              aria-label="Toggle dark/light theme"
              title="Toggle theme"
            >
              <span data-icon="sun">☀️</span>
              <span data-icon="moon">🌙</span>
            </button>
          </div>
        </div>
      </div>
    </nav>

<section class="section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-6">
            <div class="card card-glass p-4 p-md-5 fade-slide">
              <h1 class="h4 fw-bold mb-1">Verify your email</h1>
              <div class="text-muted-soft small mb-4" id="verifyHint">
                Confirming token... 

              </div>

              <div class="alert alert-warning" id="verifyAlert" role="alert">
                Verifying...
              </div>

              <div class="d-grid gap-2">
                <button class="btn btn-brand" id="btnVerify" type="button">Verify now</button>
                <button class="btn btn-soft d-none" id="btnResend" type="button">
                  Resend verification email
                </button>
              </div>

              <div class="mt-3 small text-muted-soft" id="verifyError"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
          <div>© <span id="year"></span> Book Me Events</div>
          <div class="text-muted-soft small">Email verification</div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
      import { apiFetch, fetchMe, setToken, getToken } from '../js/api.js';
      import { toast, setYear } from '../js/ui.js';
      import { initThemeToggle } from '../js/theme-toggle.js';

      setYear('year');
      initThemeToggle();

      function getTokenFromUrl() {
        const url = new URL(window.location.href);
        return url.searchParams.get('token') || '';
      }

      const verificationToken = getTokenFromUrl();
      const btnVerify = document.getElementById('btnVerify');
      const btnResend = document.getElementById('btnResend');
      const verifyAlert = document.getElementById('verifyAlert');
      const verifyError = document.getElementById('verifyError');

      const setState = ({ variant = 'warning', text = '' } = {}) => {
        verifyAlert.className = `alert alert-${variant}`;
        verifyAlert.textContent = text;
      };

      const verify = async () => {
        verifyError.textContent = '';

        if (!verificationToken) {
          setState({ variant: 'danger', text: 'Missing verification token.' });
          return;
        }

        // If user is logged out, we can still verify by token by calling endpoint WITHOUT requiring auth,
        // but your backend route is protected. So we prompt login if needed.
        try {
          await apiFetch('/api/v1/auth/verify-email?token=' + encodeURIComponent(verificationToken), {
            method: 'POST',
            body: JSON.stringify({ token: verificationToken }),
          });

          setState({ variant: 'success', text: 'Email verified successfully.' });
          toast({ title: 'Verified', message: 'Your email is now verified.', variant: 'success' });

          // Redirect to appropriate dashboard.
          try {
            const meRes = await fetchMe();
            const me = meRes?.data || meRes;
            const role = (me?.role || '').toUpperCase();

            const dest = role === 'ADMIN'
              ? 'admin-dashboard.html'
              : role === 'VENDOR'
                ? 'vendor-dashboard.html'
                : 'user-dashboard.html';

            window.location.href = dest;
          } catch {
            window.location.href = 'profile.html';
          }
        } catch (err) {
          const msg = err?.message || 'Verification failed.';
          setState({ variant: 'danger', text: 'Verification failed.' });
          verifyError.textContent = msg;

          // If the user is not logged in, backend protect will reject.
          // Offer a resend option if they want.
          btnResend.style.display = 'block';
          btnResend.disabled = false;
        }
      };

      const resend = async () => {
        try {
          btnResend.disabled = true;
          await apiFetch('/api/v1/auth/send-verification-email', { method: 'POST', body: JSON.stringify({}) });
          toast({ title: 'Sent', message: 'Verification email sent (best-effort).', variant: 'success' });
        } catch (err) {
          toast({ title: 'Resend failed', message: err?.message || 'Try again.', variant: 'danger' });
        } finally {
          btnResend.disabled = false;
        }
      };

      btnVerify.addEventListener('click', verify);
      btnResend.addEventListener('click', resend);
    </script>
  </body>
</html>
