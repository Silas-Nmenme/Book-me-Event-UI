<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Stats - Book Me Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>
    <div id="toastHost" class="position-fixed top-0 end-0 p-3"></div>

    <nav class="navbar navbar-dark navbar-glass sticky-top bme-navbar">
      <div class="container">
        <a class="navbar-brand" href="admin-dashboard.html">
          <span class="brand-pill">
            <span class="brand-dot"></span>
            <span class="fw-bold">Book Me Events</span>
          </span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navAdminStatsContent"
          aria-controls="navAdminStatsContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div id="navAdminStatsContent" class="collapse navbar-collapse">
          <div class="ms-auto d-flex gap-2 align-items-center justify-content-end flex-wrap">
            <button
              id="themeToggleBtn"
              class="btn btn-soft bme-theme-toggle"
              type="button"
              aria-label="Toggle dark/light theme"
              title="Toggle theme"
            >
              <span data-icon="sun">☀️</span>
              <span data-icon="moon">🌙</span>
            </button>

            <button class="btn btn-soft" id="btnLogout" type="button">Logout</button>
          </div>
        </div>
      </div>
    </nav>


    <section class="section">
      <div class="container">
        <div class="row g-4 align-items-start">
          <div class="col-12 col-lg-4">
            <div class="card card-glass p-4 fade-slide">
              <div class="badge badge-glow mb-3">Admin</div>
              <h2 class="h5 fw-bold mb-1" id="meName">—</h2>
              <div class="text-muted-soft" id="meEmail">—</div>
              <hr />

              <div class="d-flex gap-3 align-items-center">
                <div id="avatar" class="rounded-circle border bme-avatar">BME</div>
                <div>
                  <div class="small text-muted-soft">Role</div>
                  <div class="fw-bold" id="meRole">ADMIN</div>
                </div>
              </div>

              <div class="mt-4 d-grid gap-2">
                <a class="btn btn-soft" href="admin-dashboard.html">Back to dashboard</a>
                <a class="btn btn-soft" href="admin-bookings.html">Bookings</a>
                <a class="btn btn-soft" href="admin-payments.html">Payments</a>
              </div>
            </div>
          </div>

          <div class="col-12 col-lg-8">
            <div class="card card-glass p-4 fade-slide bme-chat-panel">
              <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
                <div>
                  <div class="badge badge-glow text-white mb-2">Platform</div>
                  <h3 class="h5 fw-bold mb-0">Deep statistics</h3>
                </div>
                <div class="d-flex gap-2 align-items-center">
                  <button id="btnRefreshStats" class="btn btn-soft btn-sm" type="button">Refresh</button>
                </div>
              </div>

              <div id="authzError" class="alert alert-danger d-none" role="alert"></div>
              <div id="loadingStats" class="text-muted-soft small">Loading…</div>
              <div id="errorStats" class="text-danger small d-none"></div>

              <div id="statsShell" class="d-none">
                <div class="row g-3">
                  <div class="col-12">
                    <div class="card card-glass p-3">
                      <div class="fw-bold mb-2">Bookings by status</div>
                      <div id="bookingsByStatus" class="small text-muted-soft">—</div>
                    </div>
                  </div>

                  <div class="col-12">
                    <div class="card card-glass p-3">
                      <div class="fw-bold mb-2">Payments by status</div>
                      <div id="paymentsByStatus" class="small text-muted-soft">—</div>
                    </div>
                  </div>

                  <div class="col-12">
                    <div class="card card-glass p-3">
                      <div class="fw-bold mb-2">Top vendors</div>
                      <div id="topVendors" class="small text-muted-soft">—</div>
                    </div>
                  </div>

                  <div class="col-12">
                    <div class="card card-glass p-3">
                      <div class="fw-bold mb-2">Monthly revenue</div>
                      <div id="monthlyRevenue" class="small text-muted-soft">—</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
          <div>© <span id="year"></span> Book Me Events</div>
          <div class="text-muted-soft small">Admin stats</div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
      import { fetchMe, logoutUser, clearToken, getAdminStats } from '../js/api.js';
      import { toast, setYear } from '../js/ui.js';
      import { initThemeToggle } from '../js/theme-toggle.js';
      import { initNavbarBrandRoleRedirect } from '../js/role-redirect.js';

      setYear('year');
      initThemeToggle();
      initNavbarBrandRoleRedirect();


      const avatarEl = document.getElementById('avatar');
      const authzErrorEl = document.getElementById('authzError');

      function setAvatarUrl(url) {
        if (!avatarEl) return;
        if (url) {
          avatarEl.style.backgroundImage = `url(${url})`;
          avatarEl.style.backgroundSize = 'cover';
          avatarEl.style.backgroundPosition = 'center';
          avatarEl.textContent = '';
          avatarEl.style.fontWeight = 'normal';
          return;
        }
        avatarEl.textContent = 'BME';
        avatarEl.style.backgroundImage = '';
        avatarEl.style.background = 'rgba(124,92,255,0.12)';
      }

      function escapeHtml(s) {
        return (s ?? '').toString().replace(/[&<>"']/g, (c) => {
          const m = { '&': '&amp;', '<': '<', '>': '>', '"': '"', "'": '&#039;' };
          return m[c] || c;
        });
      }

      function fmtAmount(n) {
        const num = Number(n);
        if (!Number.isFinite(num)) return '—';
        return `₦${num.toLocaleString()}`;
      }

      document.getElementById('btnLogout').addEventListener('click', async () => {
        try { await logoutUser(); } finally { clearToken(); }
        toast({ title: 'Logged out', message: 'See you again.', variant: 'success' });
        window.location.href = 'auth-login.html';
      });

      async function loadMe() {
        const res = await fetchMe();
        const me = res?.data || res;
        const role = (me?.role || me?.user?.role || '').toString().toUpperCase();

        document.getElementById('meName').textContent = me?.firstName
          ? `${me.firstName} ${me.lastName || ''}`.trim()
          : me?.name || '—';
        document.getElementById('meEmail').textContent = me?.email || '—';
        document.getElementById('meRole').textContent = role || 'ADMIN';

        if (me?.profilePicture) setAvatarUrl(me.profilePicture);
        else setAvatarUrl(null);

        if (role !== 'ADMIN') {
          authzErrorEl.classList.remove('d-none');
          authzErrorEl.textContent = 'Admin access required.';
          throw new Error('Forbidden');
        }

        return me;
      }

      function renderArrays(list, renderItem) {
        if (!Array.isArray(list) || list.length === 0) return '—';
        return list.map(renderItem).join('');
      }

      async function loadStats() {
        const loadingEl = document.getElementById('loadingStats');
        const errorEl = document.getElementById('errorStats');
        const shell = document.getElementById('statsShell');

        loadingEl.classList.remove('d-none');
        errorEl.classList.add('d-none');
        shell.classList.add('d-none');

        try {
          const res = await getAdminStats();
          const data = res?.data || res;

          const bookingsByStatusEl = document.getElementById('bookingsByStatus');
          const paymentsByStatusEl = document.getElementById('paymentsByStatus');
          const topVendorsEl = document.getElementById('topVendors');
          const monthlyRevenueEl = document.getElementById('monthlyRevenue');

          const bookingsByStatus = data?.bookingsByStatus || [];
          const paymentsByStatus = data?.paymentsByStatus || [];
          const topVendors = data?.topVendors || [];
          const monthlyRevenue = data?.monthlyRevenue || [];

          bookingsByStatusEl.innerHTML = renderArrays(bookingsByStatus, (x) => `• ${escapeHtml(x?._id || '—')}: ${escapeHtml(x?.count ?? '0')}<br/>`);
          paymentsByStatusEl.innerHTML = renderArrays(paymentsByStatus, (x) => `• ${escapeHtml(x?._id || '—')}: ${escapeHtml(x?.count ?? '0')} (total ${fmtAmount(x?.total)})<br/>`);

          topVendorsEl.innerHTML = renderArrays(topVendors, (x) => {
            const vendorId = x?._id || '';
            const vendorInfo = Array.isArray(x?.vendorInfo) ? x.vendorInfo[0] : null;
            const vendorName = vendorInfo?.businessName || vendorInfo?.name || vendorId || '—';
            return `• ${escapeHtml(vendorName)}: ${escapeHtml(x?.count ?? '0')} bookings (revenue ${fmtAmount(x?.revenue)})<br/>`;
          });

          monthlyRevenueEl.innerHTML = renderArrays(monthlyRevenue, (x) => `• ${escapeHtml(x?._id || '—')}: ${fmtAmount(x?.total)} (${escapeHtml(x?.count ?? '0')} payments)<br/>`);

          shell.classList.remove('d-none');
        } catch (e) {
          errorEl.classList.remove('d-none');
          errorEl.textContent = e?.message || 'Failed to load stats.';
        } finally {
          loadingEl.classList.add('d-none');
        }
      }

      document.getElementById('btnRefreshStats').addEventListener('click', loadStats);

      await loadMe();
      await loadStats();
    </script>
  </body>
</html>
